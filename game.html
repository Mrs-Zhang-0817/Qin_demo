<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>水德秦陵 - 解密推理冒险 v2</title>
<style>
/* ========== 色彩体系 ========== */
:root {
  --ink-black: #0B1118;
  --deep-ink: #050505;
  --stone: #111111;
  --bronze: #9A7B45;
  --bronze-bright: #B08A45;
  --verdigris: #5E786F;
  --dark-bronze: #403722;
  --silk-yellow: #C8B98A;
  --silk-bright: #D4C29A;
  --ink-text: #282014;
  --cinnabar: #8B3025;
  --disabled: #514D43;
  --btn-default: #302A1D;
  --btn-hover: #56482B;
  --btn-active: #0B1118;
  --btn-disabled-bg: #24231F;
  --btn-text: #D4C29A;
  --btn-disabled-text: #777064;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--ink-black);
  color: var(--silk-yellow);
  font-family: STKaiti, KaiTi, FangSong, serif;
  overflow: hidden;
  width: 100vw; height: 100vh;
  display: flex; align-items: center; justify-content: center;
}
#game {
  width: 100vw; max-width: 1920px; height: 100vh; max-height: 1080px;
  position: relative; overflow: hidden; background: var(--ink-black);
  font-size: 21px;
}
@media (max-aspect-ratio: 16/9) {
  #game { height: auto; aspect-ratio: 16/9; width: 100vw; max-height: 100vh; }
}
@media (min-aspect-ratio: 16/9) {
  #game { width: auto; height: 100vh; aspect-ratio: 16/9; max-width: 100vw; }
}

/* ========== 场景背景 ========== */
.scene-bg {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  background-size: cover; background-position: center; transition: opacity 2s;
  z-index: 0;
}

/* ========== 常驻 HUD 上栏 ========== */
#hud-top {
  position: absolute; top: 26px; left: 0; right: 0; height: 0; z-index: 2100;
  pointer-events: none;
}
/* 右上：风险值（含玩家名与安全状态） */
#risk-panel {
  position: absolute; right: 34px; top: 0;
  width: 440px; height: 60px;
  background: var(--ink-black); opacity: 0.88;
  border: 2px solid var(--bronze);
  outline: 1px solid var(--verdigris); outline-offset: -5px;
  box-shadow: 0 0 8px rgba(0,0,0,0.5);
  padding: 8px 18px; pointer-events: auto;
  display: flex; align-items: center; justify-content: flex-end;
  gap: 10px;
  font-family: STKaiti, KaiTi, serif;
}
#risk-panel .risk-player {
  font-size: 20px; color: var(--silk-bright); letter-spacing: 3px;
}
#risk-panel .risk-label {
  font-size: 17px; color: var(--bronze); letter-spacing: 3px;
}
#risk-panel .risk-dots-group {
  display: flex; gap: 5px; align-items: center;
}
#risk-panel .risk-dot-qin {
  width: 10px; height: 10px; border-radius: 50%;
  border: 1px solid var(--dark-bronze); background: var(--ink-black);
  transition: all 0.4s;
}
#risk-panel .risk-dot-qin.active {
  background: var(--cinnabar); border-color: #a04040;
  box-shadow: 0 0 8px rgba(140,48,37,0.5);
}
#risk-panel .risk-num {
  font-size: 17px; color: var(--silk-bright); min-width: 44px; text-align: right;
}
#risk-panel .risk-status {
  font-size: 15px; color: #60c060; letter-spacing: 2px;
}
#risk-panel .risk-status.danger { color: var(--cinnabar); animation: riskPulse 2s infinite; }
@keyframes riskPulse { 0%,100%{opacity:1} 50%{opacity:0.5} }


/* ========== 场景区域 ========== */
#scene-area {
  position: absolute; top: 0; bottom: 0; left: 0; right: 0; z-index: 10;
}

/* ========== 隐藏热区 ========== */
.interactive {
  position: absolute; cursor: default; transition: all 0.5s; z-index: 20;
  background: transparent;
}
.interactive:hover {
  border: 1px solid rgba(154,123,69,0.34);
  box-shadow: 0 0 20px rgba(94,120,111,0.09), inset 0 0 20px rgba(94,120,111,0.05);
  cursor: pointer;
}
.interactive.highlight {
  animation: pulseBronze 1.5s infinite;
  border: 1px solid rgba(176,138,69,0.5);
  box-shadow: 0 0 18px rgba(176,138,69,0.25);
}
@keyframes pulseBronze {
  0%,100% { box-shadow:0 0 18px rgba(176,138,69,0.25); }
  50% { box-shadow:0 0 30px rgba(176,138,69,0.45); }
}

/* ========== 全屏图片查看器 ========== */
#full-image-overlay {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  z-index: 3800; background: rgba(5,5,5,0.88);
  display: none; align-items: center; justify-content: center;
  flex-direction: column; cursor: pointer;
}
#full-image-overlay img {
  max-width: 88%; max-height: 72vh;
  border: 4px solid var(--bronze);
  outline: 1px solid var(--verdigris); outline-offset: -11px;
  box-shadow: 0 0 60px rgba(0,0,0,0.8), 0 0 30px rgba(154,123,69,0.15);
  pointer-events: none;
}
#full-image-overlay .fi-close-hint {
  position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
  color: var(--verdigris); font-size: 18px; letter-spacing: 4px;
  text-shadow: 0 0 10px rgba(0,0,0,0.8); opacity: 0.7;
  animation: hintPulse 2s infinite;
  cursor: pointer;
}
@keyframes hintPulse { 0%,100% { opacity: 0.5; } 50% { opacity: 1; } }
#full-image-overlay .fi-bottom-text {
  position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%);
  max-width: 80%; text-align: center; color: var(--silk-bright);
  font-size: 23px; letter-spacing: 3px; line-height: 1.6;
  text-shadow: 0 0 16px rgba(0,0,0,0.95);
  background: rgba(11,17,24,0.9);
  border: 2px solid var(--dark-bronze);
  outline: 1px solid var(--verdigris); outline-offset: -5px;
  padding: 14px 40px;
}

/* ========== 自动提示条 ========== */
#auto-hint {
  position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%);
  z-index: 2400; background: rgba(11,17,24,0.94);
  border: 2px solid var(--dark-bronze);
  outline: 1px solid var(--verdigris); outline-offset: -5px;
  box-shadow: 0 0 20px rgba(0,0,0,0.6);
  padding: 10px 60px; text-align: center;
  color: var(--silk-bright); font-size: 21px; letter-spacing: 3px;
  max-width: 90%; display: none; opacity: 0;
  transition: opacity 0.35s;
  font-family: FangSong, STFangsong, SimSun, serif;
}
#auto-hint.show { display: block; opacity: 1; }
#auto-hint.flash {
  animation: hintFlash 0.5s ease-out;
}
@keyframes hintFlash {
  0% { background: rgba(64,55,34,0.95); box-shadow: 0 0 30px rgba(154,123,69,0.3); }
  100% { background: rgba(11,17,24,0.94); box-shadow: 0 0 20px rgba(0,0,0,0.6); }
}

/* ========== 底部 HUD ========== */
#hud-bottom {
  position: absolute; bottom: 20px; left: 0; right: 0; height: 0; z-index: 2200;
  pointer-events: none;
}

/* ========== 左侧竖向面板 ========== */
#left-panel {
  position: absolute;
  left: 20px;
  top: 50%;
  transform: translateY(-50%);
  z-index: 2200;
  display: flex;
  flex-direction: column;
  gap: 10px;
  pointer-events: auto;
  width: 220px;
}
/* 功能按钮（放大版） */
.panel-entry {
  background: var(--btn-default);
  opacity: 0.92;
  border: 2px solid var(--bronze);
  outline: 1px solid var(--verdigris);
  outline-offset: -5px;
  cursor: pointer;
  font-family: STKaiti, KaiTi, serif;
  font-size: 26px;
  color: var(--btn-text);
  letter-spacing: 6px;
  transition: all 0.2s;
  box-shadow: 0 0 10px rgba(0,0,0,0.4);
  text-align: center;
  padding: 16px 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}
.panel-entry:hover {
  background: var(--btn-hover);
  border-color: var(--bronze-bright);
  color: var(--silk-bright);
  box-shadow: 0 0 16px rgba(154,123,69,0.2);
}
.panel-entry::before, .panel-entry::after {
  content: '◆'; color: var(--bronze); font-size: 12px;
  opacity: 0.6; transition: opacity 0.2s;
}
.panel-entry:hover::before, .panel-entry:hover::after { opacity: 1; }

/* 技能入口按钮（与 panel-entry 统一纯文字风格） */
#skillEntry {
  background: var(--btn-default);
  opacity: 0.92;
  border: 2px solid var(--bronze);
  outline: 1px solid var(--verdigris);
  outline-offset: -5px;
  cursor: pointer;
  font-family: STKaiti, KaiTi, serif;
  font-size: 26px;
  color: var(--btn-text);
  letter-spacing: 6px;
  transition: all 0.2s;
  box-shadow: 0 0 10px rgba(0,0,0,0.4);
  text-align: center;
  padding: 16px 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}
#skillEntry:hover {
  background: var(--btn-hover);
  border-color: var(--bronze-bright);
  color: var(--silk-bright);
  box-shadow: 0 0 16px rgba(154,123,69,0.2);
}
#skillEntry.active-entry {
  border-color: var(--bronze-bright);
  box-shadow: 0 0 20px rgba(176,138,69,0.5);
  background: var(--btn-hover);
}
#skillEntry::before, #skillEntry::after {
  content: '◆'; color: var(--bronze); font-size: 12px;
  opacity: 0.6; transition: opacity 0.2s;
}
#skillEntry:hover::before, #skillEntry:hover::after { opacity: 1; }

/* 技能弹出列表 */
#skillPopup {
  display: none;
  flex-direction: column;
  gap: 3px;
  background: rgba(11,17,24,0.95);
  border: 2px solid var(--dark-bronze);
  outline: 1px solid var(--verdigris);
  outline-offset: -3px;
  padding: 8px;
  box-shadow: 0 0 16px rgba(0,0,0,0.6);
  animation: skillSlideIn 0.2s ease-out;
}
#skillPopup.show { display: flex; }
@keyframes skillSlideIn {
  from { opacity: 0; transform: translateY(-6px); }
  to { opacity: 1; transform: translateY(0); }
}
.skill-popup-btn {
  display: block;
  padding: 10px 14px;
  background: rgba(17,17,17,0.7);
  border: 1px solid var(--dark-bronze);
  cursor: pointer;
  transition: all 0.15s;
  font-family: STKaiti, KaiTi, serif;
  font-size: 22px;
  color: var(--bronze);
  letter-spacing: 6px;
  text-align: center;
}
.skill-popup-btn:hover {
  border-color: var(--bronze);
  background: rgba(64,55,34,0.5);
  color: var(--silk-bright);
}
.skill-popup-btn.active-skill {
  border-color: var(--bronze-bright) !important;
  background: rgba(64,55,34,0.8) !important;
  box-shadow: 0 0 12px rgba(176,138,69,0.5) !important;
  color: var(--silk-bright) !important;
}
.skill-popup-btn:disabled {
  opacity: 0.3; cursor: not-allowed; filter: grayscale(1);
}
/* 面板分隔线 */
#left-panel .divider {
  width: 100%;
  height: 1px;
  background: var(--dark-bronze);
  margin: 4px 0;
  opacity: 0.5;
}

/* ========== 梦境文字 ========== */
#dreamText {
  position: absolute;
  bottom: 18%;
  left: 50%;
  transform: translateX(-50%);
  z-index: 2500;
  color: var(--silk-bright);
  font-size: 22px;
  letter-spacing: 3px;
  text-align: center;
  max-width: 75%;
  text-shadow: 0 0 24px rgba(0,0,0,0.95);
  font-family: FangSong, STFangsong, serif;
  display: none;
  pointer-events: none;
}

/* ========== 对话系统 ========== */
#dialogue {
  position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%);
  background: rgba(11,17,24,0.92); border: 2px solid var(--dark-bronze);
  outline: 1px solid var(--verdigris); outline-offset: -5px;
  padding: 14px 48px; max-width: 900px; text-align: center;
  z-index: 3200; color: var(--silk-bright); font-size: 22px; line-height: 1.7;
  display: none; letter-spacing: 2px;
  box-shadow: 0 0 30px rgba(0,0,0,0.7);
  font-family: FangSong, STFangsong, SimSun, serif;
}
#dialogue .speaker { color: var(--bronze-bright); font-weight: bold; margin-bottom: 6px; font-size: 23px; letter-spacing: 4px; }
#dialogue .continue { color: var(--verdigris); font-size: 18px; margin-top: 10px; animation: hintBlink 1.2s infinite; }
@keyframes hintBlink { 0%,100%{opacity:0.5} 50%{opacity:1} }

/* ========== 通用全屏面板 ========== */
.qin-panel-overlay {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  z-index: 3500; background: rgba(5,5,5,0.72);
  display: none; align-items: center; justify-content: center;
}
.qin-panel {
  position: relative;
  width: 1700px; max-width: 92%; height: 824px; max-height: 82%;
  background: rgba(17,17,17,0.97);
  border: 4px solid var(--bronze);
  outline: 1px solid var(--verdigris); outline-offset: -11px;
  box-shadow: 0 0 60px rgba(0,0,0,0.8);
  padding: 40px 48px; overflow-y: auto;
  display: flex; flex-direction: column;
  font-family: FangSong, STFangsong, SimSun, serif;
}
.qin-panel::-webkit-scrollbar { width: 6px; }
.qin-panel::-webkit-scrollbar-track { background: rgba(17,17,17,0.3); }
.qin-panel::-webkit-scrollbar-thumb { background: var(--dark-bronze); border-radius: 3px; }
.qin-panel h2 {
  font-family: STKaiti, KaiTi, serif; font-size: 38px; color: var(--silk-bright);
  letter-spacing: 8px; margin-bottom: 30px; text-align: center;
  border-bottom: 1px solid var(--dark-bronze); padding-bottom: 16px;
}
.qin-panel h2::before { content: '◆ '; color: var(--bronze); font-size: 20px; }
.qin-panel h3 {
  font-family: STKaiti, KaiTi, serif; font-size: 25px; color: var(--bronze-bright);
  letter-spacing: 4px; margin: 20px 0 10px;
}
.qin-panel .close-btn {
  position: absolute; top: 20px; right: 24px;
  width: 160px; height: 48px;
  background: var(--btn-default); border: 2px solid var(--bronze);
  color: var(--btn-text); font-family: STKaiti, KaiTi, serif;
  font-size: 20px; letter-spacing: 4px; cursor: pointer;
  transition: all 0.18s; display: flex; align-items: center; justify-content: center;
  outline: 1px solid var(--verdigris); outline-offset: -5px;
}
.qin-panel .close-btn:hover {
  background: var(--btn-hover); border-color: var(--bronze-bright);
  color: var(--silk-bright);
}

/* ========== 秦式按钮 ========== */
.qin-btn {
  background: var(--btn-default); border: 2px solid var(--bronze);
  color: var(--btn-text); font-family: STKaiti, KaiTi, serif;
  font-size: 23px; letter-spacing: 4px; padding: 10px 32px;
  cursor: pointer; transition: all 0.18s;
  outline: 1px solid var(--verdigris); outline-offset: -7px;
  box-shadow: 0 0 8px rgba(0,0,0,0.4);
  position: relative;
}
.qin-btn:hover { background: var(--btn-hover); border-color: var(--bronze-bright); color: var(--silk-bright); }
.qin-btn:active { background: var(--btn-active); }
.qin-btn.cinnabar {
  background: #3a1510; border-color: var(--cinnabar); color: #d4a090;
  outline-color: #6a403a;
}
.qin-btn.cinnabar:hover { background: #4a2018; border-color: #a04040; color: #e0b0a0; }
.qin-btn:disabled {
  background: var(--btn-disabled-bg); border-color: var(--disabled);
  color: var(--btn-disabled-text); outline-color: var(--disabled); cursor: not-allowed;
}

/* ========== 笔记/物品项 ========== */
.note-item {
  background: rgba(17,17,17,0.6); border: 1px solid var(--dark-bronze);
  padding: 14px 18px; margin: 8px 0; 
  transition: all 0.2s;
}
.note-item:hover { border-color: var(--bronze); background: rgba(17,17,17,0.8); }
.note-item .nt { color: var(--silk-bright); font-size: 21px; letter-spacing: 3px; }
.note-item .nc { color: var(--bronze); font-size: 18px; margin-top: 6px; line-height: 1.5; }

/* ========== 秘宝网格 ========== */
.artifact-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
@media (max-width: 900px) { .artifact-grid { grid-template-columns: repeat(2, 1fr); } }
.artifact-card {
  background: rgba(17,17,17,0.7); border: 1px solid var(--dark-bronze);
  padding: 16px 10px; text-align: center; border-radius: 0;
  cursor: default; transition: all 0.2s;
  min-height: 110px; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 8px;
  outline: 1px solid var(--verdigris); outline-offset: -4px; outline-color: transparent;
  transition: outline-color 0.2s;
}
.artifact-card:hover { border-color: var(--bronze); background: rgba(30,25,15,0.9); }
.artifact-card.key-item { border-color: var(--bronze); box-shadow: 0 0 12px rgba(154,123,69,0.25); }
.artifact-card.key-item:hover { outline-color: var(--verdigris); }

/* ========== 推理板 ========== */
.reason-area {
  position: relative; min-height: 200px; border: 1px solid var(--dark-bronze);
  padding: 16px; margin: 12px 0;
  background: rgba(5,3,0,0.5);
}
.reason-board { display: flex; flex-wrap: wrap; gap: 10px; align-items: flex-start; position: relative; z-index: 1; }
.reason-slot {
  background: rgba(64,55,34,0.4); border: 1px solid var(--dark-bronze);
  padding: 8px 18px; cursor: pointer; font-size: 20px; color: var(--silk-yellow);
  transition: all 0.18s; letter-spacing: 2px;
}
.reason-slot:hover { border-color: var(--bronze); background: rgba(64,55,34,0.6); }
.reason-slot.selected-slot { border-color: var(--bronze-bright); box-shadow: 0 0 12px rgba(176,138,69,0.3); }
.reason-result { color: var(--silk-bright); font-size: 20px; text-align: center; padding: 12px; margin-top: 10px; border-top: 1px solid var(--dark-bronze); }

/* ========== 拼图元素 ========== */
.puzzle-grid { display: grid; gap: 8px; margin: 0 auto; }
.puzzle-slot {
  border: 2px dashed var(--dark-bronze); background: rgba(17,17,17,0.5);
  display: flex; align-items: center; justify-content: center; cursor: pointer;
  min-height: 60px; transition: all 0.2s; color: var(--dark-bronze); font-size: 18px;
}
.puzzle-slot.filled { border: 2px solid var(--bronze); background: rgba(64,55,34,0.3); color: var(--bronze-bright); }
.puzzle-slot.wrong { border-color: var(--cinnabar); animation: shake 0.5s; }
@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-5px)} 75%{transform:translateX(5px)} }
.puzzle-piece {
  background: rgba(64,55,34,0.4); border: 1px solid var(--dark-bronze);
  padding: 10px 16px; text-align: center; cursor: pointer;
  color: var(--silk-yellow); font-size: 18px; transition: all 0.15s;
  letter-spacing: 2px;
}
.puzzle-piece:hover { background: rgba(64,55,34,0.7); border-color: var(--bronze); }
.puzzle-piece.selected { border-color: var(--bronze-bright); box-shadow: 0 0 14px rgba(176,138,69,0.4); }
.puzzle-piece.used { opacity: 0.3; pointer-events: none; }

/* ========== 技能栏(复用底部) ========== */
.skill-bar { 
  display: flex; gap: 6px; align-items: center; flex-wrap: wrap; 
  padding: 0; margin-top: 4px;
}
.skill-btn-small {
  display: flex; flex-direction: column; align-items: center; gap: 2px;
  padding: 4px 8px; background: rgba(17,17,17,0.7);
  border: 1px solid var(--dark-bronze); cursor: pointer;
  font-size: 16px; color: var(--bronze); transition: all 0.18s;
  font-family: STKaiti, KaiTi, serif;
  min-width: 54px;
  pointer-events: auto;
}
.skill-btn-small:hover { border-color: var(--bronze); background: rgba(64,55,34,0.5); }
.skill-btn-small.active-skill { border-color: var(--bronze-bright) !important; background: rgba(64,55,34,0.8) !important; box-shadow: 0 0 16px rgba(176,138,69,0.5) !important; color: var(--silk-bright) !important; }
.skill-btn-small.owned { border-color: var(--dark-bronze); color: var(--silk-yellow); }
.skill-btn-small:disabled { opacity: 0.3; cursor: not-allowed; filter: grayscale(1); }

/* ========== 标题画面 ========== */
#title-screen {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  z-index: 5000; display: flex; flex-direction: column; align-items: center;
  justify-content: center;
  background: linear-gradient(180deg, var(--deep-ink), var(--ink-black) 40%, #100c08 70%, var(--deep-ink));
}
#title-screen .title-main {
  font-size: clamp(32px, 5vw, 52px); color: var(--bronze-bright);
  text-shadow: 0 0 30px rgba(154,123,69,0.5), 0 0 60px rgba(64,55,34,0.3);
  letter-spacing: 16px; margin-bottom: 10px; font-family: STKaiti, KaiTi, serif;
}
#title-screen .title-sub {
  font-size: clamp(14px, 1.5vw, 18px); color: var(--verdigris);
  letter-spacing: 20px; margin-bottom: 70px; font-family: FangSong, STFangsong, serif;
}
#title-screen .title-menu { display: flex; flex-direction: column; gap: 20px; align-items: center; }
#title-screen .qin-title-btn {
  background: transparent; border: 2px solid var(--dark-bronze); color: var(--bronze-bright);
  font-size: 23px; padding: 14px 80px; cursor: pointer;
  font-family: STKaiti, KaiTi, serif; letter-spacing: 10px;
  transition: all 0.3s;
  outline: 1px solid transparent; outline-offset: -5px;
}
#title-screen .qin-title-btn:hover {
  background: rgba(64,55,34,0.25); border-color: var(--bronze-bright);
  color: var(--silk-bright); box-shadow: 0 0 24px rgba(154,123,69,0.2);
  outline-color: var(--verdigris);
}
#title-screen .water-effect {
  position: absolute; bottom: 0; width: 100%; height: 140px;
  background: linear-gradient(0deg, rgba(10,20,40,0.3), transparent);
  animation: waterRise 8s ease-in-out infinite;
}
@keyframes waterRise { 0%,100%{height:100px} 50%{height:180px} }

/* ========== 章节选择 ========== */
.chapter-select { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 16px; }
@media (max-width: 700px) { .chapter-select { grid-template-columns: 1fr; } }
.chapter-card {
  background: rgba(17,17,17,0.8); border: 1px solid var(--dark-bronze);
  padding: 20px; cursor: pointer; transition: all 0.2s; position: relative;
  outline: 1px solid transparent; outline-offset: -4px;
}
.chapter-card:hover { border-color: var(--bronze); background: rgba(30,25,15,0.9); outline-color: var(--verdigris); }
.chapter-card.locked { opacity: 0.35; cursor: not-allowed; filter: grayscale(0.5); }
.chapter-card .ch-num { color: var(--bronze-bright); font-size: 18px; letter-spacing: 4px; }
.chapter-card .ch-title { font-size: 23px; margin: 6px 0; letter-spacing: 3px; }
.chapter-card .ch-desc { font-size: 18px; color: var(--bronze); }

/* ========== 场景过渡 ========== */
.transition-overlay {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  background: var(--deep-ink); z-index: 4500; opacity: 0; transition: opacity 1.5s;
  pointer-events: none;
}
.transition-overlay.active { opacity: 1; }

/* ========== 黑水门按钮 ========== */
.gate-btn-qin {
  position: absolute; z-index: 30; border-radius: 50%;
  width: 48px; height: 48px; cursor: pointer;
  border: 2px solid var(--dark-bronze);
  transition: all 0.3s;
  outline: 1px solid transparent; outline-offset: -3px;
}
.gate-btn-qin:hover {
  border-color: var(--bronze-bright);
  box-shadow: 0 0 18px rgba(154,123,69,0.4);
  outline-color: var(--verdigris);
}

/* ========== 热区编辑器 ========== */
#hs-editor-bar {
  position: absolute; top: 0; left: 0; right: 0; z-index: 5000;
  background: rgba(20,10,5,0.95); border-bottom: 2px solid #e09030;
  padding: 6px 16px; display: none; align-items: center; gap: 10px;
  flex-wrap: wrap; pointer-events: auto;
}
#hs-editor-bar .hs-eb-title {
  color: #e09030; font-size: 16px; letter-spacing: 3px;
  font-family: STKaiti, KaiTi, serif; margin-right: 8px; white-space: nowrap;
}
#hs-editor-bar button {
  background: #302010; border: 1px solid #805020; color: #d0b070;
  font-family: STKaiti, KaiTi, serif; font-size: 14px; padding: 4px 12px;
  cursor: pointer; letter-spacing: 2px; white-space: nowrap; transition: all 0.15s;
}
#hs-editor-bar button:hover { background: #503020; border-color: #c08030; color: #f0d090; }
#hs-editor-bar button.active-btn { background: #604020; border-color: #e09030; color: #ffd090; box-shadow: 0 0 8px rgba(224,144,48,0.3); }
#hs-editor-bar .hs-sep { color: #604020; margin: 0 4px; }
#hs-editor-bar .hs-info { color: #907040; font-size: 13px; letter-spacing: 2px; }

/* 编辑器属性面板 */
#hs-prop-panel {
  position: absolute; right: 10px; top: 90px; z-index: 5000;
  background: rgba(15,8,5,0.95); border: 2px solid #e09030;
  padding: 12px; display: none; width: 220px; font-family: STKaiti, KaiTi, serif;
}
#hs-prop-panel h4 { color: #e09030; font-size: 15px; margin: 0 0 8px; letter-spacing: 2px; }
#hs-prop-panel label { color: #b09060; font-size: 13px; display: block; margin: 4px 0 1px; }
#hs-prop-panel input {
  width: 60px; background: #1a0f08; border: 1px solid #604020;
  color: #d0b070; font-size: 14px; padding: 3px 6px; font-family: monospace;
}
#hs-prop-panel .prop-row { display: flex; gap: 10px; align-items: center; }
#hs-prop-panel .prop-row button {
  background: #302010; border: 1px solid #604020; color: #b09060;
  font-size: 12px; padding: 2px 8px; cursor: pointer;
}
#hs-prop-panel .prop-row button:hover { background: #503020; }

/* 编辑器中的热区样式 */
.editor-mode .interactive {
  border: 2px dashed rgba(255,200,50,0.7) !important;
  background: rgba(255,200,50,0.12) !important;
  cursor: move !important;
  z-index: 60 !important;
  pointer-events: auto !important;
}
.editor-mode .interactive:hover {
  border: 2px solid rgba(255,200,50,0.9) !important;
  background: rgba(255,200,50,0.22) !important;
  box-shadow: 0 0 16px rgba(255,200,50,0.3) !important;
}
.editor-mode .interactive.hs-selected {
  border: 2px solid #ff4040 !important;
  background: rgba(255,60,60,0.18) !important;
  box-shadow: 0 0 20px rgba(255,60,60,0.4) !important;
}
.editor-mode .interactive.dragging {
  opacity: 0.7; border-style: solid !important;
}
.editor-mode .hs-label-tag {
  position: absolute; top: -22px; left: 0; background: rgba(255,180,30,0.9);
  color: #1a0800; font-size: 11px; padding: 1px 6px; pointer-events: none;
  white-space: nowrap; font-weight: bold; letter-spacing: 1px;
}

/* 拖拽时的遮罩 */
#hs-drag-cover {
  position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
  z-index: 9999; display: none; cursor: move;
}

/* 编辑器快捷键提示 */
#hs-shortcut-hint {
  position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
  z-index: 5000; color: #907040; font-size: 14px; letter-spacing: 2px;
  display: none; pointer-events: none;
}
</style>
</head>
<body>
<div id="game">
  <div class="scene-bg" id="sceneBg"></div>

  <!-- 常驻 HUD 上栏 -->
  <div id="hud-top">
    <div id="risk-panel">
      <span class="risk-player">沈砚</span>
      <span class="risk-label">风险值</span>
      <div class="risk-dots-group" id="riskDotsGroup"></div>
      <span class="risk-num" id="riskNum"></span>
      <span class="risk-status" id="riskStatusText">○ 安全</span>
    </div>
  </div>


  <!-- 场景交互区 -->
  <div id="scene-area"></div>

  <!-- 热区编辑器工具栏 -->
  <div id="hs-editor-bar">
    <span class="hs-eb-title">◆ 热区编辑器</span>
    <span class="hs-info" id="hs-scene-name">-</span>
    <span class="hs-sep">|</span>
    <button id="hs-btn-select" onclick="hsSetTool('select')" class="active-btn">选择/移动</button>
    <button id="hs-btn-resize" onclick="hsSetTool('resize')">调整大小</button>
    <span class="hs-sep">|</span>
    <button onclick="hsSaveConfig()">💾 保存</button>
    <button onclick="hsExportJSON()">📥 导出JSON</button>
    <button onclick="hsImportJSON()">📤 导入JSON</button>
    <span class="hs-sep">|</span>
    <button onclick="hsResetScene()">🔄 重置当前场景</button>
    <button onclick="hsResetAll()">⚠ 重置全部</button>
    <span class="hs-sep">|</span>
    <button onclick="hsToggleEditor()" style="border-color:#c04030;color:#e08070">退出编辑器</button>
  </div>

  <!-- 热区属性面板 -->
  <div id="hs-prop-panel">
    <h4 id="hs-prop-title">热区属性</h4>
    <label>X:</label><input type="number" id="hs-prop-x" onchange="hsPropChanged()">
    <label>Y:</label><input type="number" id="hs-prop-y" onchange="hsPropChanged()">
    <label>宽:</label><input type="number" id="hs-prop-w" onchange="hsPropChanged()">
    <label>高:</label><input type="number" id="hs-prop-h" onchange="hsPropChanged()">
    <div class="prop-row" style="margin-top:8px">
      <button onclick="hsPropNudge(-5,0)">◀-5</button>
      <button onclick="hsPropNudge(5,0)">+5▶</button>
      <button onclick="hsPropNudge(0,-5)">▲-5</button>
      <button onclick="hsPropNudge(0,5)">+5▼</button>
    </div>
    <div class="prop-row" style="margin-top:4px">
      <button onclick="hsPropNudge(-1,0)">◀-1</button>
      <button onclick="hsPropNudge(1,0)">+1▶</button>
      <button onclick="hsPropNudge(0,-1)">▲-1</button>
      <button onclick="hsPropNudge(0,1)">+1▼</button>
    </div>
    <div id="hs-prop-id" style="color:#907040;font-size:11px;margin-top:6px"></div>
  </div>

  <!-- 拖拽遮罩 -->
  <div id="hs-drag-cover"></div>

  <!-- 快捷键提示 -->
  <div id="hs-shortcut-hint">Ctrl+E 进入/退出编辑器 | 拖拽移动热区 | 右键属性面板 | Delete删除选中</div>

  <!-- 全屏图片查看器 -->
  <div id="full-image-overlay">
    <img id="full-image-img" src="" alt="">
    <div class="fi-bottom-text" id="full-image-text"></div>
    <div class="fi-close-hint" id="full-image-close-hint">— 点击画面继续 —</div>
  </div>

  <!-- 自动提示条 -->
  <div id="auto-hint"></div>

  <!-- 对话系统 -->
  <div id="dialogue"><div class="speaker"></div><div class="text"></div><div class="continue">— 点击继续 —</div></div>

  <!-- 左侧面板 -->
  <div id="left-panel">
    <div class="panel-entry" onclick="openQinPanel('notes')">帛书笔记</div>
    <div class="panel-entry" onclick="openQinPanel('reason')">推理板</div>
    <div class="divider"></div>
    <div id="skillEntry" onclick="toggleSkillPanel()">技  能</div>
    <div id="skillPopup"></div>
  </div>

  <!-- 底部 HUD（仅用作提示/对话容器） -->
  <div id="hud-bottom"></div>

  <!-- 标题画面 -->
  <div id="title-screen"></div>

  <!-- 场景过渡 -->
  <div class="transition-overlay" id="transition"></div>

  <!-- BGM 背景音乐 -->
  <audio id="bgm-player" loop style="display:none"></audio>
</div>

<script>
// ==================== 引擎核心 ====================
var G = {
  chapter: 0, scene: 0,
  risk: 0, maxRisk: 10,
  inventory: {},
  skills: {},
  notes: [],
  reasoningClues: [],
  completedPuzzles: {},
  dialogueQueue: [],
  activeSkill: null,
  chapterUnlocked: {1:true, 2:false, 3:false, 4:false},
  selectedPiece: null,
  gameStarted: false,
  hintTimer: null,
  hintQueue: [],
  fullImageCallback: null,
  interactionLock: false,
  sceneContent: {},  // 场景内容追踪: { 'sceneId': { 'itemId': true, ... } }
  // 热区编辑器相关
  editorMode: false,          // 编辑器开关
  currentSceneId: '',         // 当前场景ID
  _hsIndex: 0,                // 热区创建序号
  hotspotConfig: {},          // 加载的热区配置
  hsSelected: null,           // 当前选中的热区元素
  hsTool: 'select',           // 编辑器工具: 'select' | 'resize'
  hsDragging: false,          // 是否正在拖拽
  hsDragData: null            // 拖拽数据
};

// 标记场景内容已发现
function markContent(sceneId, itemId) {
  if (!G.sceneContent[sceneId]) G.sceneContent[sceneId] = {};
  G.sceneContent[sceneId][itemId] = true;
}
// 检查是否所有必须内容都已发现
function allContentFound(sceneId, requiredIds) {
  var found = G.sceneContent[sceneId] || {};
  for (var i = 0; i < requiredIds.length; i++) {
    if (!found[requiredIds[i]]) return false;
  }
  return true;
}

function $(id) { return document.getElementById(id); }

var sceneArea = $('scene-area');
var sceneBg = $('sceneBg');
var dialogueEl = $('dialogue');
var titleScreen = $('title-screen');
var transitionEl = $('transition');
var hintEl = $('auto-hint');
var fullImgOverlay = $('full-image-overlay');
var fullImgImg = $('full-image-img');
var fullImgText = $('full-image-text');
var fullImgCloseHint = $('full-image-close-hint');
var bgmPlayer = $('bgm-player');

// BGM 映射：sceneId → 音频文件名
var BGM_MAP = {
  'restoration':   '修复室.ogg',
  'shrine':        '祠堂探索.ogg',
  'ch1outer':      '祠堂探索.ogg',
  'shrinefront':   '祠堂探索.ogg',
  'southwall':     '祠堂探索.ogg',
  'mainhall':      '祠堂探索.ogg',
  'greenox':       '祠堂探索.ogg',
  'ch3start':      '地宫探索.ogg',
  'ch3writing':    '地宫探索.ogg',
  'ch3measure':    '地宫探索.ogg',
  'ch3track':      '地宫探索.ogg',
  'ch3tiger':      '地宫探索.ogg',
  'ch4start':      '地宫探索.ogg',
  'ch4astro':      '地宫探索.ogg',
  'ch4rivers':     '地宫探索.ogg',
  'ch4buoy':       '地宫探索.ogg',
  'ch4pool':       '地宫探索.ogg'
};

var BGM_CURRENT = ''; // 当前播放的 BGM 文件名

function playBGM(sceneId) {
  var file = BGM_MAP[sceneId];
  if (!file) {
    // 不在映射中的场景（如标题），停止 BGM
    stopBGM();
    return;
  }
  if (BGM_CURRENT === file) return; // 同场景不重复切
  BGM_CURRENT = file;
  bgmPlayer.src = 'Music/' + file;
  bgmPlayer.volume = 0.4;
  bgmPlayer.play().catch(function() {});
}

function playTitleBGM() {
  if (BGM_CURRENT === '菜单页面.ogg') return;
  BGM_CURRENT = '菜单页面.ogg';
  bgmPlayer.src = 'Music/菜单页面.ogg';
  bgmPlayer.volume = 0.4;
  bgmPlayer.play().catch(function() {});
}

function stopBGM() {
  bgmPlayer.pause();
  bgmPlayer.currentTime = 0;
  BGM_CURRENT = '';
}

function IMG(cat, name) {
  return '02_Art_Assets/' + cat + '/' + name;
}
function LV(num, name) {
  var dirs = ['LV000_Prologue_Black_Water_Remnant', 'LV001_Shenmu_Temple',
    'LV002_Xuanniao', 'LV003_Terracotta_Array', 'LV004_Mercury_River',
    'LV005_Alchemy_Room', 'LV006_Qin_King_Tomb'];
  return IMG(dirs[num], name);
}

// ==================== 热区配置加载 ====================
function loadHotspotConfig() {
  // 先从 localStorage 加载
  var saved = null;
  try { saved = localStorage.getItem('qin_hotspots_config'); } catch(e) {}
  if (saved) {
    try { G.hotspotConfig = JSON.parse(saved).scenes || {}; console.log('热区配置: 从localStorage加载'); return; } catch(e) {}
  }
  // 再尝试从 hotspots.json 加载
  try {
    var xhr = new XMLHttpRequest();
    xhr.open('GET', 'hotspots.json?_=' + Date.now(), false);
    xhr.send();
    if (xhr.status === 200 || xhr.status === 0) {
      var cfg = JSON.parse(xhr.responseText);
      G.hotspotConfig = cfg.scenes || {};
      console.log('热区配置: 从hotspots.json加载, 共 ' + Object.keys(G.hotspotConfig).length + ' 个场景');
      return;
    }
  } catch(e) { console.log('热区配置: 无法加载hotspots.json, 使用默认值'); }
  G.hotspotConfig = {};
}

function saveHotspotConfigToStorage() {
  var cfg = { version: 1, scenes: G.hotspotConfig };
  try { localStorage.setItem('qin_hotspots_config', JSON.stringify(cfg)); } catch(e) {}
}

// 获取热区配置坐标，如无则返回默认值
function getHotspotPos(sceneId, hsId, defX, defY, defW, defH) {
  if (G.hotspotConfig[sceneId] && G.hotspotConfig[sceneId].hotspots && G.hotspotConfig[sceneId].hotspots[hsId]) {
    var c = G.hotspotConfig[sceneId].hotspots[hsId];
    return { x: c.x, y: c.y, w: c.w, h: c.h };
  }
  return { x: defX, y: defY, w: defW, h: defH };
}

// ==================== 热区编辑器 ====================
function hsToggleEditor() {
  G.editorMode = !G.editorMode;
  var bar = $('hs-editor-bar');
  var prop = $('hs-prop-panel');
  var hint = $('hs-shortcut-hint');
  var game = $('game');

  if (G.editorMode) {
    bar.style.display = 'flex';
    hint.style.display = 'block';
    game.classList.add('editor-mode');
    G.hsSelected = null;
    G.hsTool = 'select';
    hsUpdateSceneLabel();
    hsRefreshAllLabels();
    console.log('热区编辑器已开启 - 拖拽移动热区，右键面板编辑属性');
  } else {
    bar.style.display = 'none';
    prop.style.display = 'none';
    hint.style.display = 'none';
    game.classList.remove('editor-mode');
    hsRemoveAllLabels();
  }
}

function hsSetTool(tool) {
  G.hsTool = tool;
  $('hs-btn-select').classList.toggle('active-btn', tool === 'select');
  $('hs-btn-resize').classList.toggle('active-btn', tool === 'resize');
}

function hsUpdateSceneLabel() {
  $('hs-scene-name').textContent = '场景: ' + (G.currentSceneId || '未设置');
}

function hsRefreshAllLabels() {
  hsRemoveAllLabels();
  if (!G.editorMode) return;
  var els = document.querySelectorAll('#scene-area .interactive');
  for (var i = 0; i < els.length; i++) {
    hsAddLabel(els[i]);
  }
}

function hsAddLabel(el) {
  if (!G.editorMode) return;
  if (el.querySelector('.hs-label-tag')) return;
  var tag = document.createElement('div');
  tag.className = 'hs-label-tag';
  var id = el.dataset.hsId || ('#' + el.dataset.hsIdx);
  tag.textContent = id;
  el.appendChild(tag);
}

function hsRemoveAllLabels() {
  var tags = document.querySelectorAll('.hs-label-tag');
  for (var i = 0; i < tags.length; i++) tags[i].remove();
}

function hsSelectEl(el) {
  if (!G.editorMode) return;
  if (G.hsSelected) G.hsSelected.classList.remove('hs-selected');
  G.hsSelected = el;
  if (el) {
    el.classList.add('hs-selected');
    hsShowPropPanel(el);
  } else {
    $('hs-prop-panel').style.display = 'none';
  }
}

function hsShowPropPanel(el) {
  var panel = $('hs-prop-panel');
  panel.style.display = 'block';
  var id = el.dataset.hsId || ('热区#' + el.dataset.hsIdx);
  $('hs-prop-title').textContent = '热区: ' + id;
  $('hs-prop-id').textContent = '场景: ' + (el.dataset.hsScene || '?');
  $('hs-prop-x').value = parseInt(el.style.left) || 0;
  $('hs-prop-y').value = parseInt(el.style.top) || 0;
  $('hs-prop-w').value = parseInt(el.style.width) || 0;
  $('hs-prop-h').value = parseInt(el.style.height) || 0;
}

function hsPropChanged() {
  if (!G.hsSelected) return;
  G.hsSelected.style.left = ($('hs-prop-x').value | 0) + 'px';
  G.hsSelected.style.top = ($('hs-prop-y').value | 0) + 'px';
  G.hsSelected.style.width = ($('hs-prop-w').value | 0) + 'px';
  G.hsSelected.style.height = ($('hs-prop-h').value | 0) + 'px';
}

function hsPropNudge(dx, dy) {
  if (!G.hsSelected) return;
  var x = (parseInt(G.hsSelected.style.left) || 0) + dx;
  var y = (parseInt(G.hsSelected.style.top) || 0) + dy;
  G.hsSelected.style.left = x + 'px';
  G.hsSelected.style.top = y + 'px';
  hsShowPropPanel(G.hsSelected);
}

// 保存配置：从DOM读取所有热区位置写入配置
function hsSaveConfig() {
  if (!G.editorMode) { alert('请先进入编辑器模式(Ctrl+E)'); return; }
  var sceneId = G.currentSceneId;
  if (!sceneId) { alert('当前场景ID未设置'); return; }
  if (!G.hotspotConfig[sceneId]) G.hotspotConfig[sceneId] = { name: sceneId, hotspots: {} };
  
  var els = document.querySelectorAll('#scene-area .interactive');
  var count = 0;
  for (var i = 0; i < els.length; i++) {
    var el = els[i];
    var id = el.dataset.hsId;
    if (!id) continue;
    var cfg = {
      x: parseInt(el.style.left) || 0,
      y: parseInt(el.style.top) || 0,
      w: parseInt(el.style.width) || 0,
      h: parseInt(el.style.height) || 0,
      label: G.hotspotConfig[sceneId].hotspots[id] ? G.hotspotConfig[sceneId].hotspots[id].label : id
    };
    G.hotspotConfig[sceneId].hotspots[id] = cfg;
    count++;
  }
  saveHotspotConfigToStorage();
  hsExportJSON(); // 同时下载JSON文件
  showHint('已保存 ' + count + ' 个热区到 ' + sceneId + ' (localStorage + JSON下载)');
}

// 导出JSON文件下载
function hsExportJSON() {
  var cfg = { version: 1, description: '热区配置文件 - 可通过编辑器(Ctrl+E)自由调整', scenes: G.hotspotConfig };
  var json = JSON.stringify(cfg, null, 2);
  var blob = new Blob([json], { type: 'application/json' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url; a.download = 'hotspots.json';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
  console.log('热区配置已导出为 hotspots.json');
}

// 导入JSON文件
function hsImportJSON() {
  var input = document.createElement('input');
  input.type = 'file'; input.accept = '.json';
  input.onchange = function() {
    var file = input.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(e) {
      try {
        var cfg = JSON.parse(e.target.result);
        if (cfg.scenes) {
          // 合并导入的配置
          for (var sceneId in cfg.scenes) {
            if (!G.hotspotConfig[sceneId]) G.hotspotConfig[sceneId] = { name: sceneId, hotspots: {} };
            var hs = cfg.scenes[sceneId].hotspots || cfg.scenes[sceneId];
            if (hs) {
              for (var hsId in hs) {
                G.hotspotConfig[sceneId].hotspots[hsId] = hs[hsId];
              }
            }
          }
          saveHotspotConfigToStorage();
          showHint('已导入热区配置，共 ' + Object.keys(cfg.scenes).length + ' 个场景。重新进入场景生效。');
          // 重新应用配置到当前场景
          hsApplyConfigToScene();
        } else {
          alert('JSON格式不正确，需要包含 "scenes" 字段');
        }
      } catch(err) { alert('JSON解析失败: ' + err.message); }
    };
    reader.readAsText(file);
  };
  input.click();
}

// 将配置应用到当前场景的热区
function hsApplyConfigToScene() {
  if (!G.currentSceneId) return;
  var sceneCfg = G.hotspotConfig[G.currentSceneId];
  if (!sceneCfg || !sceneCfg.hotspots) return;
  var els = document.querySelectorAll('#scene-area .interactive');
  for (var i = 0; i < els.length; i++) {
    var el = els[i];
    var id = el.dataset.hsId;
    if (id && sceneCfg.hotspots[id]) {
      var c = sceneCfg.hotspots[id];
      el.style.left = c.x + 'px';
      el.style.top = c.y + 'px';
      el.style.width = c.w + 'px';
      el.style.height = c.h + 'px';
    }
  }
}

// ==================== 编辑器拖拽事件处理 ====================
document.addEventListener('mousedown', function(e) {
  if (!G.editorMode) return;
  var el = e.target.closest('#scene-area .interactive');
  if (!el) {
    hsSelectEl(null);
    return;
  }
  e.preventDefault(); e.stopPropagation();
  
  // 右键点击=选中
  if (e.button === 2) {
    hsSelectEl(el);
    return;
  }
  if (e.button !== 0) return;
  
  hsSelectEl(el);
  
  var cover = $('hs-drag-cover');
  cover.style.display = 'block';
  G.hsDragging = true;
  G.hsDragData = {
    el: el,
    startX: e.clientX,
    startY: e.clientY,
    origLeft: parseInt(el.style.left) || 0,
    origTop: parseInt(el.style.top) || 0,
    origW: parseInt(el.style.width) || 0,
    origH: parseInt(el.style.height) || 0,
    mode: G.hsTool
  };
  el.classList.add('dragging');
});

document.addEventListener('mousemove', function(e) {
  if (!G.editorMode || !G.hsDragging) return;
  e.preventDefault();
  var d = G.hsDragData;
  var dx = e.clientX - d.startX;
  var dy = e.clientY - d.startY;
  
  if (d.mode === 'select') {
    d.el.style.left = (d.origLeft + dx) + 'px';
    d.el.style.top = (d.origTop + dy) + 'px';
  } else if (d.mode === 'resize') {
    d.el.style.width = Math.max(10, d.origW + dx) + 'px';
    d.el.style.height = Math.max(10, d.origH + dy) + 'px';
  }
});

document.addEventListener('mouseup', function(e) {
  if (!G.editorMode || !G.hsDragging) return;
  G.hsDragging = false;
  $('hs-drag-cover').style.display = 'none';
  if (G.hsDragData && G.hsDragData.el) {
    G.hsDragData.el.classList.remove('dragging');
    hsShowPropPanel(G.hsDragData.el);
  }
  G.hsDragData = null;
});

// 阻止编辑器模式下的右键菜单
document.addEventListener('contextmenu', function(e) {
  if (!G.editorMode) return;
  if (e.target.closest('#scene-area .interactive') || 
      e.target.closest('#scene-area') ||

// 编辑器快捷键
document.addEventListener('keydown', function(e) {
  // Ctrl+E 切换编辑器
  if (e.ctrlKey && e.key === 'e') {
    e.preventDefault();
    hsToggleEditor();
    return;
  }
  // 编辑器模式下的快捷键
  if (!G.editorMode) return;
  // Delete键删除选中热区
  if (e.key === 'Delete' && G.hsSelected) {
    e.preventDefault();
    var el = G.hsSelected;
    hsSelectEl(null);
    el.remove();
    hsRefreshAllLabels();
    showHint('已删除热区');
  }
  // 方向键微调
  if (G.hsSelected && ['ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].indexOf(e.key) >= 0) {
    e.preventDefault();
    var step = e.shiftKey ? 10 : 1;
    if (e.key === 'ArrowLeft') hsPropNudge(-step, 0);
    if (e.key === 'ArrowRight') hsPropNudge(step, 0);
    if (e.key === 'ArrowUp') hsPropNudge(0, -step);
    if (e.key === 'ArrowDown') hsPropNudge(0, step);
  }
});

// ==================== 风险值系统 ====================
function updateRisk(delta) {
  G.risk = Math.min(G.maxRisk, Math.max(0, G.risk + delta));
  renderRisk();
  if (G.risk >= 8) showHint('黑水的气息越来越重……再这样下去，后果不堪设想。');
}
function renderRisk() {
  var group = $('riskDotsGroup');
  var num = $('riskNum');
  var statusEl = $('riskStatusText');
  var h = '';
  for (var i = 0; i < G.maxRisk; i++) {
    h += '<div class="risk-dot-qin' + (i < G.risk ? ' active' : '') + '"></div>';
  }
  group.innerHTML = h;
  num.textContent = G.risk + ' / ' + G.maxRisk;

  if (statusEl) {
    if (G.risk <= 3) { statusEl.textContent = '○ 安全'; statusEl.className = 'risk-status'; }
    else if (G.risk <= 6) { statusEl.textContent = '◈ 警戒'; statusEl.className = 'risk-status'; }
    else { statusEl.textContent = '◆ 危险'; statusEl.className = 'risk-status danger'; }
  }
}

// ==================== 自动提示系统(3秒自动消失) ====================
function showHint(text) {
  if (!text) return;
  G.hintQueue.push(text);
  processHintQueue();
}
function processHintQueue() {
  if (G.hintTimer || G.hintQueue.length === 0) return;
  // 等对话结束后再显示
  if (G.dialogueQueue.length > 0) {
    // 延迟检查
    G.hintTimer = setTimeout(function() {
      G.hintTimer = null;
      processHintQueue();
    }, 500);
    return;
  }
  var text = G.hintQueue.shift();
  hintEl.textContent = text;
  hintEl.classList.add('show', 'flash');
  setTimeout(function() { hintEl.classList.remove('flash'); }, 500);

  G.hintTimer = setTimeout(function() {
    hintEl.classList.remove('show');
    G.hintTimer = null;
    // 显示下一个提示
    setTimeout(function() { processHintQueue(); }, 400);
  }, 2500);
}

// ==================== 全屏图片查看器 ====================
function showFullImage(imgSrc, bottomText, onClose) {
  clearHints();
  G.interactionLock = true;
  fullImgImg.src = imgSrc;
  fullImgText.textContent = bottomText || '';
  fullImgText.style.display = bottomText ? 'block' : 'none';
  fullImgOverlay.style.display = 'flex';
  fullImgOverlay.style.cursor = 'pointer';
  fullImgOverlay.onclick = function(e) {
    // 文字已展示 → 点击关闭
    if (fullImgText.style.display === 'block' && fullImgText.textContent) {
      dismissFullImage();
      return;
    }
    // 只有图 → 先展示文字（如果有）
    if (bottomText) {
      fullImgText.style.display = 'block';
      fullImgCloseHint.textContent = '— 点击画面继续 —';
      return;
    }
    // 无文字 → 直接关闭
    dismissFullImage();
  };
  fullImgCloseHint.textContent = '— 点击画面继续 —';
  G.fullImageCallback = onClose || null;
}
function dismissFullImage() {
  fullImgOverlay.style.display = 'none';
  fullImgOverlay.onclick = null;
  var cb = G.fullImageCallback;
  G.fullImageCallback = null;
  G.interactionLock = false;
  if (cb) { cb(); }
}
function clearHints() {
  if (G.hintTimer) { clearTimeout(G.hintTimer); G.hintTimer = null; }
  G.hintQueue = [];
  hintEl.classList.remove('show', 'flash');
}

// ==================== 对话系统 ====================
function showDialogue(speaker, text, callback) {
  // 清除提示，获取交互锁
  clearHints();
  G.interactionLock = true;
  G.dialogueQueue.push({s: speaker, t: text, c: callback});
  if (G.dialogueQueue.length === 1) nextDialogue();
}
function nextDialogue() {
  if (G.dialogueQueue.length === 0) {
    dialogueEl.style.display = 'none';
    G.interactionLock = false;
    processHintQueue();
    return;
  }
  var d = G.dialogueQueue[0];
  dialogueEl.querySelector('.speaker').textContent = d.s;
  dialogueEl.querySelector('.text').textContent = d.t;
  dialogueEl.style.display = 'block';
}
dialogueEl.addEventListener('click', function() {
  if (G.dialogueQueue.length === 0) return;
  if (fullImgOverlay.style.display === 'flex') return; // 不抢全屏图的点击
  var d = G.dialogueQueue.shift();
  if (d.c) d.c();
  nextDialogue();
});

// opts.hsId: 热区唯一ID（用于编辑器识别和配置保存）
// opts.investigateImg, opts.skill, opts.onSkill, opts.skillHint: 原有参数
function addInteractive(x, y, w, h, label, onClick, opts) {
  opts = opts || {};
  var hsId = opts.hsId || ('hs_' + G._hsIndex);
  var sceneId = G.currentSceneId || 'unknown';

  // 从配置中加载覆盖坐标
  var pos = getHotspotPos(sceneId, hsId, x, y, w, h);
  x = pos.x; y = pos.y; w = pos.w; h = pos.h;

  var el = document.createElement('div');
  el.className = 'interactive';
  el.style.left = x + 'px';
  el.style.top = y + 'px';
  el.style.width = w + 'px';
  el.style.height = h + 'px';
  el.dataset.hsId = hsId;
  el.dataset.hsScene = sceneId;
  el.dataset.hsIdx = G._hsIndex;
  G._hsIndex++;

  if (opts.investigateImg) {
    el.dataset.investigateImg = opts.investigateImg;
  }
  if (opts.skill) el.dataset.skill = opts.skill;

  el.onclick = function() {
    // 编辑器模式下不触发游戏逻辑
    if (G.editorMode) {
      hsSelectEl(el);
      return;
    }
    // 交互锁：图片/文字展示期间阻止其他点击
    if (G.interactionLock) return;
    // 技能模式：已激活正确技能 → 展现答案
    if (G.activeSkill && opts.skill && opts.skill.split(',').indexOf(G.activeSkill) >= 0) {
      var skillName = G.activeSkill;
      if (opts.investigateImg) {
        showFullImage(opts.investigateImg, opts.investigateText || '', function() {
          if (opts.onSkill) { opts.onSkill(skillName); }
          else if (onClick) { onClick(); }
        });
      } else {
        if (opts.onSkill) { opts.onSkill(skillName); }
        else if (onClick) { onClick(); }
      }
      G.activeSkill = null;
      var allInt = document.querySelectorAll('.interactive');
      for (var j = 0; j < allInt.length; j++) allInt[j].classList.remove('highlight');
      var allPopupBtns = document.querySelectorAll('.skill-popup-btn');
      for (var pj = 0; pj < allPopupBtns.length; pj++) allPopupBtns[pj].classList.remove('active-skill');
    // 技能已激活但技能不匹配 → 提示无法使用
    } else if (G.activeSkill && opts.skill) {
      showHint('【' + G.activeSkill + '】在这里没有发现什么。');
      G.activeSkill = null;
      var allInt2 = document.querySelectorAll('.interactive');
      for (var k = 0; k < allInt2.length; k++) allInt2[k].classList.remove('highlight');
      var allPopupBtns2 = document.querySelectorAll('.skill-popup-btn');
      for (var pk = 0; pk < allPopupBtns2.length; pk++) allPopupBtns2[pk].classList.remove('active-skill');
    }
    // 热区需要技能但未激活任何技能 → 展现引导提示词
    else if (opts.skill) {
      showHint(opts.skillHint || '这里似乎藏着什么……或许需要使用合适的技能来调查。');
    }
    // 普通调查模式：有调查图 → 全屏展示图，点击后执行回调
    else if (opts.investigateImg) {
      showFullImage(opts.investigateImg, opts.investigateText || '', function() {
        if (onClick) onClick();
      });
    } else if (onClick) {
      onClick();
    }
  };

  // 编辑器模式下的事件
  el.addEventListener('mousedown', function(e) {
    if (!G.editorMode) return;
    // 游戏模式的click已经处理互动，这里处理编辑器拖拽
    // 统一在document的mousedown处理
  });

  sceneArea.appendChild(el);

  if (G.editorMode) hsAddLabel(el);
  return el;
}

// ==================== 推理板逻辑 ====================
var selectedClues = [];
function renderReasoningClues() {
  var board = $('reasonBoard');
  if (!board) return;
  var h = '';
  G.reasoningClues.forEach(function(c) {
    var sel = selectedClues.indexOf(c.id) >= 0 ? ' selected-slot' : '';
    h += '<span class="reason-slot' + sel + '" onclick="toggleClue(\'' + c.id + '\')">' + c.text + '</span>';
  });
  if (G.reasoningClues.length === 0) h = '<span style="color:var(--dark-bronze);font-size:18px">当前无可用线索</span>';
  board.innerHTML = h;
}
function toggleClue(id) {
  var idx = selectedClues.indexOf(id);
  if (idx >= 0) selectedClues.splice(idx, 1);
  else selectedClues.push(id);
  renderReasoningClues();
}
function clearReasoning() { selectedClues = []; renderReasoningClues(); var r = $('reasonResult'); if (r) r.innerHTML = ''; }
function checkReasoning() {
  var result = $('reasonResult');
  if (!result) return;
  var ids = selectedClues.sort().join(',');

  if (ids === '北方属水,水色为黑,秦承玄水') {
    result.innerHTML = '<span style="color:#60c060;font-size:21px">✓ 推理正确：秦承玄水 + 水色为黑 + 北方属水 → <b>机关应在北方黑水门</b></span>';
    if (!G.completedPuzzles['reasoning_done']) {
      completePuzzle('reasoning_done');
      addNote('推理结论', '秦以水德代周火德。水为黑色，对应北方。秦陵入口——黑水门，必在北方。');
      showHint('推理完成：机关应在北方黑水门');
    }
  } else if (ids === '朱丝缚木,树创复合,南方属火') {
    result.innerHTML = '<span style="color:#60c060;font-size:21px">✓ 推理正确：需先以火困木灵，再以金断木形</span>';
    addNote('神木推理', '朱丝属火，可困树神。火克木，朱丝缚木后方可用斧伐树。');
  } else if (ids === '金克木,青铜属金') {
    result.innerHTML = '<span style="color:#60c060;font-size:21px">✓ 推理正确：青铜斧属金，金可克木</span>';
  } else if (ids === '木入土,秦以水德') {
    result.innerHTML = '<span style="color:#60c060;font-size:21px">✓ 推理正确：木入土后，最终导向黑水，水德归秦</span>';
  } else if (selectedClues.length === 1) {
    result.innerHTML = '<span style="color:var(--bronze-bright);font-size:19px">需要选择多条线索组合推理。秦为水德、水对应哪些要素？</span>';
  } else if (selectedClues.length === 2) {
    result.innerHTML = '<span style="color:var(--bronze-bright);font-size:19px">两条线索的关联还不够完整，试着再加入一条。</span>';
  } else {
    result.innerHTML = '<span style="color:var(--bronze-bright);font-size:19px">这些线索的关联尚不明确，试试其他组合。</span>';
  }
}

function startSilkPuzzle() {
  dismissFullImage();

  var pieces = [
    {id: 'A', name: '黑水', correct: 0, img: LV(0, '残片A-黑水.png')},
    {id: 'B', name: '入陵', correct: 1, img: LV(0, '残片B-入陵.png')},
    {id: 'C', name: '玄药', correct: 2, img: LV(0, '残片C-玄药.png')},
    {id: 'D', name: '不死', correct: 3, img: LV(0, '残片D-不死.png')},
    {id: 'E', name: '路线纹路', correct: 4, img: LV(0, '残片E-路线纹路.png')}
  ];
  var slots = [null, null, null, null, null];
  var availablePieces = pieces.slice();

  var panel = document.createElement('div');
  panel.className = 'qin-panel';
  panel.id = 'silkPuzzlePanel';
  panel.style.width = '95%'; panel.style.maxWidth = '1000px'; panel.style.height = 'auto'; panel.style.maxHeight = '88%';

  function renderPuzzle() {
    var h = '<h2>帛书复原</h2>';
    h += '<p style="text-align:center;color:var(--bronze);font-size:18px;margin-bottom:14px;letter-spacing:2px">点击下方残片选择，再点击上方空位放入，复原"黑水入陵，玄药不死"</p>';

    // 帛书底图
    h += '<div style="margin:0 auto;max-width:760px;border:2px solid var(--dark-bronze);background:rgba(5,3,0,0.6);padding:10px">';
    h += '<img src="' + LV(0, '帛书底图（水渍、虫蛀、缺口版）.png') + '" style="width:100%;max-height:230px;object-fit:contain;opacity:0.85;display:block">';
    h += '</div>';

    // 空位槽
    h += '<div style="display:flex;gap:12px;justify-content:center;margin-top:14px;flex-wrap:wrap">';
    for (var i = 0; i < 5; i++) {
      h += '<div class="puzzle-slot' + (slots[i] ? ' filled' : '') + '"';
      h += ' onclick="window._placeSilkPiece(' + i + ')" id="slot' + i + '"';
      h += ' style="width:118px;height:64px;display:flex;align-items:center;justify-content:center;flex-shrink:0">';
      if (slots[i]) h += '<span style="color:var(--bronze-bright);font-weight:bold;font-size:18px">' + slots[i].name + '</span>';
      else h += '<span style="color:var(--dark-bronze);font-size:16px">空位</span>';
      h += '</div>';
    }
    h += '</div>';

    // 残片选择
    h += '<div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:14px;min-height:64px">';
    availablePieces.forEach(function(p) {
      h += '<div class="puzzle-piece' + (G.selectedPiece === p.id ? ' selected' : '') + '" onclick="window._selectSilkPiece(\'' + p.id + '\')" id="piece' + p.id + '"';
      h += ' style="display:flex;align-items:center;gap:8px;padding:8px 14px;flex-shrink:0">';
      h += '<img src="' + p.img + '" style="height:38px;width:auto;max-width:80px;object-fit:contain">';
      h += '<span style="font-size:18px">' + p.name + '</span></div>';
    });
    h += '</div>';

    h += '<div style="display:flex;gap:12px;justify-content:center;margin-top:16px">';
    h += '<button class="qin-btn" onclick="window._resetSilkPuzzle()">重排</button></div>';
    h += '<button class="close-btn" onclick="window._closeSilkPuzzle()">返回探索</button>';
    panel.innerHTML = h;
  }

  window._resetSilkPuzzle = function() {
    availablePieces = pieces.slice();
    slots = [null, null, null, null, null];
    G.selectedPiece = null;
    renderPuzzle();
  };

  window._placeSilkPiece = function(idx) {
    if (!G.selectedPiece) { showHint('请先在下方选择一块残片。'); return; }
    var piece = pieces.find(function(p) { return p.id === G.selectedPiece; });
    if (!piece) return;
    if (slots[idx]) { availablePieces.push(slots[idx]); slots[idx] = null; }
    slots[idx] = piece;
    availablePieces = availablePieces.filter(function(p) { return p.id !== piece.id; });
    G.selectedPiece = null;
    renderPuzzle();

    var allFilled = true;
    for (var i = 0; i < 5; i++) { if (!slots[i]) { allFilled = false; break; } }
    if (!allFilled) return;

    var correct = true;
    for (var i = 0; i < 5; i++) {
      if (!slots[i] || slots[i].correct !== i) { correct = false; break; }
    }
    if (correct) {
      setTimeout(function() {
        completePuzzle('silk_puzzle');
        showFullImage(LV(0, '帛书修复后的完整图.png'), '帛书修复完成："黑水入陵，玄药不死"', function() {
          showDialogue('沈砚', '复原了——"黑水入陵，玄药不死。"', function() {
            addNote('帛书复原', '帛书拼合完成，显示"黑水入陵，玄药不死"八个字。');
            showDialogue('沈砚', '帛书上的残图显示了一条路径：从地表旧祠出发，沿折线通往地下……', function() {
              addNote('路线图', '帛书残图指示旧祠位置，路径折向地下，尽头缺了半枚玉玦形状。');
              showDialogue('沈砚', '路径尽头有一个半枚玉玦形状的缺口——和我的黑玉残玦完全吻合。也许需要用水来激活它。', function() {
                window._closeSilkPuzzle();
              });
            });
          });
        });
      }, 500);
    } else {
      showHint('残片的位置不太对……再调整一下。');
    }
  };

  window._selectSilkPiece = function(id) {
    G.selectedPiece = G.selectedPiece === id ? null : id;
    renderPuzzle();
  };

  window._closeSilkPuzzle = function() {
    panel.parentElement && panel.parentElement.remove();
    if (!G.completedPuzzles['silk_puzzle']) {
      availablePieces = pieces.slice();
      slots = [null, null, null, null, null];
    }
  };

  // 用overlay包裹
  var overlay = document.createElement('div');
  overlay.className = 'qin-panel-overlay';
  overlay.style.display = 'flex';
  overlay.onclick = function(e) { if (e.target === overlay) { window._closeSilkPuzzle(); } };
  overlay.appendChild(panel);
  $('game').appendChild(overlay);
  renderPuzzle();
}

function startMuralPuzzle() {
  dismissFullImage();
  var correct = ['A','B','C','D','E','F'];
  var current = ['C','A','F','B','E','D'];
  var murals = {
    A: '南山大梓，树冠遮天', B: '秦人持青铜斧伐树',
    C: '风雨骤起，斧痕闭合', D: '病者夜闻鬼语',
    E: '朱丝绕树，披发再伐', F: '树断，青牛出走丰水'
  };
  var selectedMural = -1;

  var panel = document.createElement('div');
  panel.className = 'qin-panel';
  panel.id = 'muralPanel';
  panel.style.height = 'auto'; panel.style.maxHeight = '88%';

  function render() {
    var h = '<h2>风雨自合壁画排序</h2>';
    h += '<p style="text-align:center;color:var(--bronze);font-size:18px;margin-bottom:12px;letter-spacing:2px">按正确顺序排列壁画(点击交换)</p>';
    h += '<div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap">';
    current.forEach(function(id, i) {
      h += '<div class="puzzle-piece" onclick="window._swapMural(' + i + ')" style="min-width:90px">';
      h += '<div style="font-weight:bold;font-size:18px">' + String.fromCharCode(65+i) + '</div>';
      h += '<div style="font-size:16px">' + murals[id] + '</div></div>';
    });
    h += '</div>';
    h += '<div style="display:flex;gap:10px;justify-content:center;margin-top:14px"><button class="qin-btn" onclick="window._checkMural()">确认顺序</button></div>';
    h += '<button class="close-btn" onclick="window._closeMural()">返回探索</button>';
    panel.innerHTML = h;
  }

  window._swapMural = function(idx) {
    if (selectedMural === -1) { selectedMural = idx; render(); }
    else { var tmp = current[selectedMural]; current[selectedMural] = current[idx]; current[idx] = tmp; selectedMural = -1; render(); }
  };

        if (step < 6) { showHint(order[step]+'国兵俑转向中央黑水旗！('+(step+1)+'/6)'); step++; if (step >= 6) { completePuzzle('tiger'); gainItem('十二金人残片', '十二金人残片', '终局隐藏条件收集物', true); showDialogue('系统', '六国兵俑全部转向黑水旗，齐声跪拜！十二金人残片龛打开。', function() { showDialogue('沈砚', '六国文字、车轨、尺度各不相同。可在这里，它们都被迫归于同一条黑水线。', function() { addNote('六合同风', '六国兵俑归一。"六合同风，玄水归一"——水银地宫入口开启。'); G.chapterUnlocked[4] = true; showDialogue('系统', '第三章完成！第四章已解锁。', function() { showDialogue('沈砚', '这座陵墓记住的不是战争，而是统一之后的秩序。'); }); }); }); } }
      };
      sceneArea.appendChild(triggerBtn);
    });
  }, {hsId: 'tiger_plat', icon: '🐯'});
}

// ==================== 第四章：水银江河 ====================
function ch4Start() {
  G.chapter = 4; G.scene = 0; clearScene(); setBg(LV(4, '主背景5.png'));
  G.currentSceneId = 'ch4start'; G._hsIndex = 0;
  playBGM('ch4start');
  G.sceneContent['ch4start'] = {};
  unlockSkill('封气', '临时封堵水银蒸汽孔和毒气孔'); renderSkills();
  showHint('探索水银地宫前庭，小心银雾');

  var C4_SCENE = 'ch4start';

  // 墙碑：必须先阅读
  addInteractive(200, 300, 100, 80, '', function() {
    markContent(C4_SCENE, 'tablet');
    showDialogue('沈砚', '墙碑："银为江，黑为归，气不可久闻"。银雾有毒！', function() {
      addNote('银雾风险', '水银蒸汽有毒，需要封堵喷气孔才能安全探索。');
    });
  }, {hsId: 'tablet', icon: '🪦'});

  // 喷气孔：需要先阅读墙碑
  addInteractive(550, 200, 80, 60, '', function() {
    if (!(G.sceneContent[C4_SCENE] || {})['tablet']) {
      showHint('前方银雾弥漫，在贸然行动前还是先看看墙上的碑文吧。');
      return;
    }
    showDialogue('沈砚', '右侧喷气孔正在喷出银白雾气。堵住它，银雾就会消散，前方的闸门才能操作。', function() {
      completePuzzle('seal');
      addNote('银雾封气', '喷气孔已被封堵，银雾消散，水银地宫的闸门可以操作了。');
      transitionScene(function() { ch4Astronomy(); });
    });
  }, {hsId: 'gas_hole', icon: '💨', skill: '封气', skillHint: '银白色的雾气从孔中喷出……雾气有毒，需要想办法封住这个喷气孔。'});
}

function ch4Astronomy() {
  G.scene = 1; clearScene(); setBg(LV(4, '主背景5.png'));
  G.currentSceneId = 'ch4astro'; G._hsIndex = 0;
  playBGM('ch4astro');
  showHint('点亮北斗七星，记录星图');
  var starsLit = 0;
  for (var i = 0; i < 7; i++) {
    var hsId = 'star_' + i;
    var x = 300 + (i%4)*80; var y = 180 + Math.floor(i/4)*100 + (i===4?50:0)+(i===5?30:0)+(i===6?60:0);
    var pos = getHotspotPos('ch4astro', hsId, x, y, 44, 44);
    var star = document.createElement('div');
    star.className = 'interactive';
    star.style.left = pos.x+'px'; star.style.top = pos.y+'px';
    star.style.width = pos.w+'px'; star.style.height = pos.h+'px';
    star.style.borderRadius = '50%'; star.style.border = '2px solid var(--dark-bronze)';
    star.style.background = 'rgba(17,17,17,0.6)'; star.style.cursor = 'pointer';
    star.dataset.hsId = hsId; star.dataset.hsScene = 'ch4astro';
    star.onclick = function() { starsLit++; this.style.background = 'rgba(200,200,250,0.9)'; this.style.boxShadow = '0 0 18px rgba(200,200,250,0.7)'; this.style.borderColor = 'rgba(200,200,250,0.7)'; this.onclick = function(){}; if (starsLit >= 7) { completePuzzle('dipper'); showDialogue('沈砚', '北斗七星全部点亮！星图记录完成。"斗柄指北，玄水乃归"。', function() { addNote('北斗星图', '北斗七星的位置已记录。斗柄指北，需将此映射到地面水渠。'); transitionScene(function() { ch4Rivers(); }); }); } };
    sceneArea.appendChild(star);
  }
  addInteractive(450, 350, 150, 40, '', function() { showDialogue('沈砚', '"斗柄指北，玄水乃归"——北方是水银的终点。'); }, {hsId: 'star_hint', icon: '📜'});
}

function ch4Rivers() {
  G.scene = 2; clearScene(); setBg(LV(4, '主背景5.png'));
  G.currentSceneId = 'ch4rivers'; G._hsIndex = 0;
  playBGM('ch4rivers');
  showHint('将三路水银全部导向北方黑水主渠');
  var gates = {south: true, west: true, east: true, north: false};
  var dirMap = {0:'gate_south', 1:'gate_west', 2:'gate_east', 3:'gate_north'};
  ['南','西','东','北'].forEach(function(dir, i) {
    var hsId = dirMap[i];
    var pos = getHotspotPos('ch4rivers', hsId, 250+i*150, 300, 80, 80);
    var gate = document.createElement('div');
    gate.className = 'interactive'; gate.style.left = pos.x+'px'; gate.style.top = pos.y+'px';
    gate.style.width = pos.w+'px'; gate.style.height = pos.h+'px';
    gate.dataset.hsId = hsId; gate.dataset.hsScene = 'ch4rivers';
    gate.style.border = '2px solid var(--dark-bronze)';
    gate.style.display = 'flex'; gate.style.alignItems = 'center'; gate.style.justifyContent = 'center';
    gate.style.color = 'var(--bronze-bright)'; gate.style.fontSize = '18px';
    gate.style.background = 'rgba(17,17,17,0.8)'; gate.style.cursor = 'pointer';
    gate.style.fontFamily = 'STKaiti, KaiTi, serif';
    gate.textContent = dir + '闸门';
    gate.onclick = function() {
      if (dir === '南') { gates.south = false; gate.style.borderColor = 'var(--cinnabar)'; updateRisk(1); showDialogue('沈砚', '南侧是火坑！必须关闭，否则水银会被蒸发.', function(){}); }
      else if (dir === '西') { gates.west = !gates.west; gate.style.borderColor = gates.west ? 'var(--dark-bronze)' : '#60c060'; showHint('西侧金门已调整。'); }
      else if (dir === '东') { gates.east = !gates.east; gate.style.borderColor = gates.east ? 'var(--dark-bronze)' : '#60c060'; showHint('东侧木渠已调整。'); }
      else if (dir === '北') {
        if (!gates.south && !gates.west && !gates.east) { gates.north = true; gate.style.borderColor = '#60c060'; showDialogue('系统', '北方黑水主渠开启！三路水银汇入北渠，第一段北斗水线出现。', function() { completePuzzle('rivers'); addNote('江河归流', '水银从三路汇入北方黑水主渠，形成北斗水线雏形。'); transitionScene(function() { ch4Buoy(); }); }); }
        else { showHint('还需要先调整其他闸门，确保水银能正确汇入北渠。'); }
      }
    };
    sceneArea.appendChild(gate);
  });
  addInteractive(420, 200, 200, 30, '', function() { showDialogue('沈砚', '"百川不同源，归秦则一流"——将所有水银都导向北方。'); }, {hsId: 'river_hint', icon: '📜'});
}

function ch4Buoy() {
  G.scene = 3; clearScene(); setBg(LV(4, '主背景5.png'));
  G.currentSceneId = 'ch4buoy'; G._hsIndex = 0;
  playBGM('ch4buoy');
  showHint('校准三枚浮标水位：斗口中、斗身高、斗柄低');
  var targets = {'斗口':'中','斗身':'高','斗柄':'低'};
  var current = {'斗口':'低','斗身':'低','斗柄':'低'};
  var levels = ['低','中','高'];
  ['斗口','斗身','斗柄'].forEach(function(part, idx) {
    var hsId = 'buoy_' + idx;
    var pos = getHotspotPos('ch4buoy', hsId, 200+idx*220, 250, 110, 130);
    var buoy = document.createElement('div');
    buoy.className = 'interactive'; buoy.style.left = pos.x+'px'; buoy.style.top = pos.y+'px';
    buoy.style.width = pos.w+'px'; buoy.style.height = pos.h+'px';
    buoy.dataset.hsId = hsId; buoy.dataset.hsScene = 'ch4buoy';
    buoy.style.border = '2px solid var(--dark-bronze)';
    buoy.style.display = 'flex'; buoy.style.flexDirection = 'column';
    buoy.style.alignItems = 'center'; buoy.style.justifyContent = 'center';
    buoy.style.color = 'var(--bronze-bright)'; buoy.style.fontSize = '18px';
    buoy.style.background = 'rgba(17,17,17,0.8)'; buoy.style.cursor = 'pointer';
    buoy.style.fontFamily = 'STKaiti, KaiTi, serif';
    buoy.innerHTML = '<div>'+part+'</div><div style="font-size:24px" id="buoy'+idx+'">低</div>';
    buoy.onclick = function() { var ci = levels.indexOf(current[part]); current[part] = levels[(ci+1)%3]; document.getElementById('buoy'+idx).textContent = current[part]; if (current['斗口']===targets['斗口'] && current['斗身']===targets['斗身'] && current['斗柄']===targets['斗柄']) { completePuzzle('buoy'); showDialogue('沈砚', '水位校准完成！北斗图案完整成形。', function() { addNote('水位校准', '三枚浮标调整正确。斗口中位、斗身高位、斗柄低位。'); transitionScene(function() { ch4BlackPool(); }); }); } };
    sceneArea.appendChild(buoy);
  });
  addInteractive(420, 400, 250, 30, '', function() { showDialogue('沈砚', '"水不及，则星不明；水太过，则斗不成"——需根据渠宽调整水位。'); }, {hsId: 'buoy_hint', icon: '📜'});
}

function ch4BlackPool() {
  G.scene = 4; clearScene(); setBg(LV(4, '主背景5.png'));
  G.currentSceneId = 'ch4pool'; G._hsIndex = 0;
  playBGM('ch4pool');
  showHint('使用黑水玉玦激活北方黑池，完成北斗水银星图');
  addInteractive(400, 180, 200, 150, '', function() {
    if (G.inventory['黑水玉玦']) {
      showDialogue('沈砚', '打开中央总闸！水银沿地面沟渠形成完整北斗。使用黑水玉玦激活黑池。', function() {
        showDialogue('系统', '斗柄指向北方黑池，水银在池中化为玄黑色。黑水渠令升起！', function() {
          completePuzzle('star_map'); gainItem('黑水渠令', '黑水渠令', '水系机关秘宝', true);
          addNote('水银星图', '北斗星渠全部点亮，水银流入北方黑池化为玄黑。获得黑水渠令。');
          showDialogue('沈砚', '水银不是为了防盗才流在这里。它在替这座陵墓记住天下的形状。', function() {
            showDialogue('沈砚', '百川江河，最终都被引向同一个黑色的北方。', function() {
              showDialogue('沈砚', '如果水银是秦陵的江河，那么不死药也许不是药。它更像是这套机关的心脏。', function() {
                showDialogue('系统', '第四章完成！前四章全破！', function() { showEnding(); });
              });
            });
          });
        });
      });
    } else { showDialogue('沈砚', '黑池需要黑水玉玦来激活。'); }
  }, {hsId: 'black_pool', icon: '🌑'});
}

// ==================== 结局 ====================
function showEnding() {
  clearScene(); setBg('');
  var endingType;
  if (G.risk <= 3) endingType = 'hidden';
  else if (G.risk <= 6) endingType = 'seal';
  else endingType = 'take';

  var endings = {
    seal: { title: '结局：封药', text: '你重新封印了不死药。秦陵重新沉入地下，你带走了拓片与真相。\n\n真正的不朽，是文明记忆。', extra: '黑水声在身后逐渐远去。那些刻在石壁上的文字，比任何不死药都更长久。' },
    take: { title: '结局：取药', text: '你取走了不死药，逃出秦陵。\n\n但袖口渗出了黑色的水痕……对永生的贪欲，延续了秦皇的执念。', extra: '那滴水痕再也没有干过。' },
    hidden: { title: '隐藏结局：黑水不息', text: '你没有取药，也没有毁药。\n\n你把黑玉残玦留在了秦王墓室，秦陵不再召唤后人。\n\n黑水声逐渐远去……你终于读懂了这座陵墓。', extra: '历史不是死亡，而是循环。\n\n你走出了秦陵，但黑玉残玦留在了那里——等待下一个读懂水德的人。' }
  };
  var e = endings[endingType];
  var stars = '';
  for (var i = 0; i < 5; i++) stars += i < Math.min(G.risk, 5) ? '★' : '☆';

  var panel = document.createElement('div');
  panel.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;z-index:5000;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(5,5,5,0.96)';
  panel.innerHTML = '' +
    '<div style="font-size:42px;color:var(--silk-bright);margin-bottom:30px;letter-spacing:10px;font-family:STKaiti,KaiTi,serif">' + e.title + '</div>' +
    '<div style="max-width:540px;text-align:center;color:var(--silk-yellow);font-size:21px;line-height:2.2;white-space:pre-line;letter-spacing:3px">' + e.text + '</div>' +
    '<div style="color:var(--bronze);margin-top:28px;font-size:18px;white-space:pre-line;text-align:center;letter-spacing:2px">' + e.extra + '</div>' +
    '<div style="margin-top:50px;color:var(--bronze-bright);font-size:20px">最终风险值：' + stars + '</div>' +
    '<button class="qin-title-btn" style="margin-top:40px;font-size:20px" onclick="location.reload()">重返标题</button>';
  $('game').appendChild(panel);
}

// ==================== 启动 ====================
var APP_VERSION = 'v2.1';
function init() {
  try {
    console.log('【水德秦陵 ' + APP_VERSION + '】开始初始化...');
    // 加载热区配置
    loadHotspotConfig();
    // 检查关键元素
    var missing = [];
    ['risk-panel','scene-area','full-image-overlay','auto-hint','dialogue','transition'].forEach(function(id) {
      if (!document.getElementById(id)) missing.push(id);
    });
    if (missing.length > 0) { console.warn('缺失元素:', missing.join(', ')); }
    renderRisk(); showTitle();
    console.log('【水德秦陵 ' + APP_VERSION + '】游戏初始化完成 (热区编辑器: Ctrl+E)');
  } catch (e) { alert('游戏加载失败: ' + e.message + '\\n\\n版本: ' + APP_VERSION); console.error(e); }
}
init();
</script>

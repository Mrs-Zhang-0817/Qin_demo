<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>水德秦陵 - 解密推理冒险</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0d0d0d;
  color: #c8b88a;
  font-family: SimSun, KaiTi, FangSong, serif;
  overflow: hidden;
  width: 100vw;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}
#game {
  width: 100vw;
  max-width: 1280px;
  height: 100vh;
  max-height: 720px;
  position: relative;
  overflow: hidden;
  background: #0d0d0d;
}
@media (max-aspect-ratio: 16/9) {
  #game { height: auto; aspect-ratio: 16/9; width: 100vw; max-height: 100vh; }
}
@media (min-aspect-ratio: 16/9) {
  #game { width: auto; height: 100vh; aspect-ratio: 16/9; max-width: 100vw; }
}
.scene-bg {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  background-size: cover; background-position: center; transition: opacity 2s;
}
#ui-top {
  position: absolute; top: 0; left: 0; right: 0; height: 48px;
  background: linear-gradient(180deg, rgba(10,5,0,0.95), rgba(10,5,0,0.6));
  display: flex; align-items: center; padding: 0 16px; z-index: 100;
  border-bottom: 1px solid #3a3020;
}
#ui-top .chapter-name { font-size: 18px; color: #b8960c; text-shadow: 0 0 10px rgba(180,140,10,0.5); flex: 1; }
#ui-top .risk-bar { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #8a6a4a; }
#ui-top .risk-dots { display: flex; gap: 3px; }
.risk-dot { width: 10px; height: 10px; border-radius: 50%; border: 1px solid #4a3020; background: #1a1008; transition: all 0.3s; }
.risk-dot.active { background: #c03020; box-shadow: 0 0 8px #c03020; border-color: #803020; }
#ui-bottom {
  position: absolute; bottom: 0; left: 0; right: 0; height: 56px;
  background: linear-gradient(0deg, rgba(10,5,0,0.95), rgba(10,5,0,0.4));
  display: flex; align-items: center; padding: 0 12px; z-index: 100;
  border-top: 1px solid #3a3020; gap: 4px; flex-wrap: wrap;
}
.ui-btn {
  background: linear-gradient(180deg, #2a1a0a, #1a0a00);
  border: 1px solid #4a3020; color: #b8960c; padding: 6px 14px;
  cursor: pointer; font-family: inherit; font-size: 13px; border-radius: 3px;
  transition: all 0.2s;
}
.ui-btn:hover { background: linear-gradient(180deg, #3a2810, #2a1808); border-color: #6a4a20; color: #d4aa30; box-shadow: 0 0 8px rgba(180,140,10,0.3); }
.ui-btn.active { background: linear-gradient(180deg, #4a3020, #2a1808); border-color: #b8960c; color: #f0d060; }
.ui-btn:disabled { opacity: 0.4; cursor: not-allowed; }
#scene-area { position: absolute; top: 48px; bottom: 56px; left: 0; right: 0; z-index: 10; }
.interactive { position: absolute; cursor: pointer; transition: all 0.2s; z-index: 20; }
.interactive:hover { filter: brightness(1.3); transform: scale(1.05); }
.interactive.highlight { animation: pulse 1.5s infinite; }
@keyframes pulse {
  0%,100% { filter: brightness(1); }
  50% { filter: brightness(1.4); box-shadow: 0 0 15px rgba(200,160,60,0.6); }
}
#dialogue {
  position: absolute; bottom: 70px; left: 50%; transform: translateX(-50%);
  background: rgba(10,5,0,0.92); border: 1px solid #4a3820; padding: 14px 22px;
  max-width: 700px; text-align: center; z-index: 200; border-radius: 4px;
  color: #d4c098; font-size: 15px; line-height: 1.6; display: none;
}
#dialogue .speaker { color: #b8960c; font-weight: bold; margin-bottom: 4px; }
#dialogue .continue { color: #6a5a3a; font-size: 12px; margin-top: 8px; animation: blink 1s infinite; }
@keyframes blink { 0%,100% { opacity: 0.6; } 50% { opacity: 1; } }
.panel {
  position: absolute; top: 60px; bottom: 70px; left: 50%; transform: translateX(-50%);
  width: 90%; max-width: 760px; background: rgba(10,5,0,0.95); border: 1px solid #4a3820;
  z-index: 300; padding: 20px 24px; overflow-y: auto; display: none; border-radius: 6px;
  box-shadow: 0 0 40px rgba(0,0,0,0.7);
}
.panel h2 { color: #b8960c; font-size: 20px; border-bottom: 1px solid #3a2810; padding-bottom: 10px; margin-bottom: 16px; text-align: center; }
.panel h3 { color: #c8a040; font-size: 16px; margin: 12px 0 6px; }
.panel .close { position: absolute; top: 10px; right: 14px; cursor: pointer; color: #8a6a4a; font-size: 20px; }
.panel .close:hover { color: #c8a040; }
.inv-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
@media (max-width: 600px) { .inv-grid { grid-template-columns: repeat(2, 1fr); } }
.inv-item {
  background: rgba(20,15,5,0.8); border: 1px solid #3a2810; padding: 12px 8px;
  text-align: center; border-radius: 4px; cursor: pointer; transition: all 0.2s;
  min-height: 90px; display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 6px;
}
.inv-item:hover { border-color: #b8960c; background: rgba(30,20,8,0.9); }
.inv-item .icon { font-size: 32px; }
.inv-item .name { font-size: 12px; color: #b8960c; }
.inv-item .desc { font-size: 10px; color: #6a5a3a; }
.inv-item.key-item { border-color: #b8960c; box-shadow: 0 0 8px rgba(180,140,10,0.4); }
.puzzle-grid { display: grid; gap: 8px; margin: 0 auto; }
.puzzle-slot {
  border: 2px dashed #4a3820; background: rgba(20,10,5,0.5);
  display: flex; align-items: center; justify-content: center; cursor: pointer;
  min-height: 50px; transition: all 0.2s; color: #4a3820; font-size: 13px;
}
.puzzle-slot.filled { border: 2px solid #6a4a20; background: rgba(40,25,10,0.7); color: #c8a040; }
.puzzle-slot.wrong { border-color: #c04030; animation: shake 0.5s; }
@keyframes shake {
  0%,100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); }
}
.puzzle-piece {
  background: rgba(30,15,5,0.9); border: 1px solid #5a4020; padding: 8px 12px;
  text-align: center; cursor: pointer; border-radius: 3px; color: #d4c098;
  font-size: 14px; transition: all 0.15s;
}
.puzzle-piece:hover { background: rgba(50,30,15,0.9); border-color: #b8960c; }
.puzzle-piece.selected { border-color: #f0d060; box-shadow: 0 0 12px rgba(240,200,60,0.5); }
.puzzle-piece.used { opacity: 0.4; pointer-events: none; }
.reason-board {
  min-height: 120px; border: 1px dashed #4a3820; padding: 12px; margin: 8px 0;
  display: flex; flex-wrap: wrap; gap: 6px; align-items: flex-start; border-radius: 4px;
}
.reason-slot {
  background: rgba(30,15,5,0.7); border: 1px solid #5a4020; padding: 6px 12px;
  border-radius: 3px; cursor: pointer; font-size: 13px; color: #b8960c;
}
.reason-slot.selected-slot { border-color: #f0d060; box-shadow: 0 0 10px rgba(240,200,60,0.4); }
.reason-result { color: #60c060; font-size: 14px; text-align: center; padding: 8px; margin-top: 8px; border-top: 1px solid #3a2810; }
#title-screen {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 500;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: linear-gradient(180deg, #050505, #0a0808 40%, #100c08 70%, #050505);
}
#title-screen .title-main {
  font-size: clamp(28px, 5vw, 52px); color: #b8960c;
  text-shadow: 0 0 30px rgba(180,140,10,0.6), 0 0 60px rgba(100,70,5,0.4);
  letter-spacing: 12px; margin-bottom: 8px;
}
#title-screen .title-sub {
  font-size: clamp(12px, 1.5vw, 16px); color: #6a5a3a; letter-spacing: 20px; margin-bottom: 60px;
}
#title-screen .title-menu { display: flex; flex-direction: column; gap: 16px; align-items: center; }
#title-screen .title-btn {
  background: transparent; border: 1px solid #4a3820; color: #c8a040;
  font-size: 18px; padding: 12px 60px; cursor: pointer; font-family: inherit;
  letter-spacing: 4px; transition: all 0.3s;
}
#title-screen .title-btn:hover {
  background: rgba(40,25,10,0.6); border-color: #b8960c; color: #f0d060;
  box-shadow: 0 0 20px rgba(180,140,10,0.3);
}
#title-screen .water-effect {
  position: absolute; bottom: 0; width: 100%; height: 120px;
  background: linear-gradient(0deg, rgba(10,20,40,0.4), transparent);
  animation: waterRise 8s ease-in-out infinite;
}
.chapter-select { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 16px; }
@media (max-width: 600px) { .chapter-select { grid-template-columns: 1fr; } }
.chapter-card {
  background: rgba(15,10,5,0.8); border: 1px solid #3a2810; padding: 16px;
  cursor: pointer; border-radius: 4px; transition: all 0.2s; position: relative;
}
.chapter-card:hover { border-color: #b8960c; background: rgba(25,15,8,0.9); }
.chapter-card.locked { opacity: 0.4; cursor: not-allowed; filter: grayscale(0.6); }
.chapter-card .ch-num { color: #b8960c; font-size: 14px; }
.chapter-card .ch-title { font-size: 18px; margin: 4px 0; }
.chapter-card .ch-desc { font-size: 12px; color: #6a5a3a; }
.transition-overlay {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  background: #000; z-index: 450; opacity: 0; transition: opacity 1.5s; pointer-events: none;
}
.transition-overlay.active { opacity: 1; }
.btn-row { display: flex; gap: 8px; flex-wrap: wrap; margin: 12px 0; justify-content: center; }
.skill-btn {
  display: flex; flex-direction: column; align-items: center; gap: 2px;
  padding: 4px 10px; background: rgba(20,10,5,0.8); border: 1px solid #3a2010;
  border-radius: 4px; cursor: pointer; font-size: 11px; color: #8a6a4a;
  transition: all 0.2s; font-family: inherit;
}
.skill-btn.owned { border-color: #5a4020; color: #b8960c; }
.skill-btn.owned:hover { border-color: #b8960c; background: rgba(40,25,10,0.8); }
.skill-btn .sk-icon { font-size: 20px; }
@keyframes waterRise { 0%,100% { height: 100px; } 50% { height: 160px; } }
.panel::-webkit-scrollbar { width: 6px; }
.panel::-webkit-scrollbar-track { background: rgba(10,5,0,0.3); }
.panel::-webkit-scrollbar-thumb { background: #4a3020; border-radius: 3px; }
.note-item {
  background: rgba(20,10,5,0.6); border: 1px solid #3a2010; padding: 10px;
  margin: 8px 0; border-radius: 3px;
}
.note-item .nt { color: #b8960c; font-size: 14px; }
.note-item .nc { color: #8a7a5a; font-size: 12px; margin-top: 4px; }
</style>
</head>
<body>
<div id="game">
  <div class="scene-bg" id="sceneBg"></div>
  <div id="ui-top">
    <span class="chapter-name" id="chapterLabel">水德秦陵</span>
    <div class="risk-bar">风险: <span class="risk-dots" id="riskDots"></span></div>
  </div>
  <div id="scene-area"></div>
  <div id="dialogue"><div class="speaker"></div><div class="text"></div><div class="continue">— 点击继续 —</div></div>
  <div id="ui-bottom"></div>
  <div id="title-screen"></div>
  <div class="transition-overlay" id="transition"></div>
</div>

<script>
// ==================== 引擎核心 ====================
var G = {
  chapter: 0, scene: 0,
  risk: 0, maxRisk: 10,
  inventory: {},
  skills: {},
  notes: [],
  reasoningClues: [],
  completedPuzzles: {},
  dialogueQueue: [],
  activeSkill: null,
  chapterUnlocked: {1:true, 2:false, 3:false, 4:false},
  selectedPiece: null,
  gameStarted: false
};

function $(id) { return document.getElementById(id); }

var sceneArea = $('scene-area');
var sceneBg = $('sceneBg');
var dialogueEl = $('dialogue');
var uiBottom = $('ui-bottom');
var chapterLabel = $('chapterLabel');
var titleScreen = $('title-screen');
var transitionEl = $('transition');

function IMG(cat, name) {
  return '02_Art_Assets/' + cat + '/' + name;
}
function LV(num, name) {
  var dirs = ['LV000_Prologue_Black_Water_Remnant', 'LV001_Shenmu_Temple',
    'LV002_Xuanniao', 'LV003_Terracotta_Array', 'LV004_Mercury_River',
    'LV005_Alchemy_Room', 'LV006_Qin_King_Tomb'];
  return IMG(dirs[num], name);
}

// 风险值
function updateRisk(delta) {
  G.risk = Math.min(G.maxRisk, Math.max(0, G.risk + delta));
  renderRisk();
  if (G.risk >= 8) showDialogue('系统', '黑水的气息越来越重……再这样下去，后果不堪设想。');
}
function renderRisk() {
  var h = '';
  for (var i = 0; i < G.maxRisk; i++) {
    h += '<div class="risk-dot' + (i < G.risk ? ' active' : '') + '"></div>';
  }
  $('riskDots').innerHTML = h;
}

// 对话系统
function showDialogue(speaker, text, callback) {
  G.dialogueQueue.push({s: speaker, t: text, c: callback});
  if (G.dialogueQueue.length === 1) nextDialogue();
}
function nextDialogue() {
  if (G.dialogueQueue.length === 0) {
    dialogueEl.style.display = 'none';
    return;
  }
  var d = G.dialogueQueue[0];
  dialogueEl.querySelector('.speaker').textContent = d.s;
  dialogueEl.querySelector('.text').textContent = d.t;
  dialogueEl.style.display = 'block';
}
dialogueEl.addEventListener('click', function() {
  if (G.dialogueQueue.length === 0) return;
  var d = G.dialogueQueue.shift();
  if (d.c) d.c();
  nextDialogue();
});

// 场景过渡
function transitionScene(callback) {
  transitionEl.classList.add('active');
  setTimeout(function() {
    callback();
    setTimeout(function() { transitionEl.classList.remove('active'); }, 600);
  }, 800);
}

// 技能/道具/谜题
function unlockSkill(id, name) { G.skills[id] = {name: name, owned: true}; renderSkills(); }
function gainItem(id, name, desc, key) { G.inventory[id] = {name: name, desc: desc, key: !!key}; }
function completePuzzle(id) { G.completedPuzzles[id] = true; }
function addNote(title, text) {
  if (!G.notes.some(function(n) { return n.title === title; })) {
    G.notes.push({title: title, text: text});
  }
}
function addReasonClue(id, text) {
  if (!G.reasoningClues.some(function(c) { return c.id === id; })) {
    G.reasoningClues.push({id: id, text: text});
  }
}

// 渲染技能栏
function renderSkills() {
  var skillDefs = [
    {id: '观纹', icon: '🔍'}, {id: '拓印', icon: '📜'}, {id: '听风', icon: '👂'},
    {id: '探土', icon: '⛏'}, {id: '辨伪', icon: '🔬'}, {id: '牵线', icon: '🪢'}, {id: '封气', icon: '🫧'}
  ];
  var h = '';
  skillDefs.forEach(function(s) {
    var owned = G.skills[s.id];
    if (owned) {
      h += '<button class="skill-btn owned" onclick="useSkill(\'' + s.id + '\')" title="' + s.id + ': ' + owned.name + '">';
      h += '<span class="sk-icon">' + s.icon + '</span>' + s.id + '</button>';
    } else {
      h += '<button class="skill-btn" disabled title="未解锁"><span class="sk-icon">' + s.icon + '</span>' + s.id + '</button>';
    }
  });
  h += '<button class="ui-btn" onclick="openPanel(\'notes\')">📖 笔记</button>';
  h += '<button class="ui-btn" onclick="openPanel(\'reason\')">🧩 推理板</button>';
  h += '<button class="ui-btn" onclick="openPanel(\'inv\')">🎒 道具</button>';
  uiBottom.innerHTML = h;
}

// 使用技能
function useSkill(skillId) {
  if (!G.skills[skillId]) return;
  if (G.activeSkill === skillId) { G.activeSkill = null; return; }
  G.activeSkill = skillId;
  showDialogue('系统', '已装备【' + skillId + '】，点击场景中的目标使用。');
  var els = document.querySelectorAll('.interactive');
  for (var i = 0; i < els.length; i++) {
    if (els[i].dataset.skill && els[i].dataset.skill.split(',').indexOf(skillId) >= 0) {
      els[i].classList.add('highlight');
    }
  }
}

// 推理板
var selectedClues = [];
function renderReasoningClues() {
  var board = $('reasonBoard');
  if (!board) return;
  var h = '';
  G.reasoningClues.forEach(function(c) {
    var sel = selectedClues.indexOf(c.id) >= 0 ? ' selected-slot' : '';
    h += '<span class="reason-slot' + sel + '" onclick="toggleClue(\'' + c.id + '\')">' + c.text + '</span>';
  });
  if (G.reasoningClues.length === 0) h = '<span style="color:#4a3820">当前无可用线索</span>';
  board.innerHTML = h;
}
function toggleClue(id) {
  var idx = selectedClues.indexOf(id);
  if (idx >= 0) selectedClues.splice(idx, 1);
  else selectedClues.push(id);
  renderReasoningClues();
}
function clearReasoning() { selectedClues = []; renderReasoningClues(); $('reasonResult').textContent = ''; }
function checkReasoning() {
  var result = $('reasonResult');
  var ids = selectedClues.sort().join(',');
  if (ids === '北方属水,水色为黑,秦承玄水') {
    result.innerHTML = '<span style="color:#60c060">✓ 推理正确：秦承玄水 + 水色为黑 + 北方属水 → <b>机关应在北方黑水门</b></span>';
  } else if (ids === '朱丝缚木,树创复合,南方属火') {
    result.innerHTML = '<span style="color:#60c060">✓ 推理正确：需先以火困木灵，再以金断木形</span>';
  } else if (ids === '金克木,青铜属金') {
    result.innerHTML = '<span style="color:#60c060">✓ 推理正确：青铜斧属金，金可克木</span>';
  } else if (ids === '木入土,秦以水德') {
    result.innerHTML = '<span style="color:#60c060">✓ 推理正确：木入土后，最终导向黑水，水德归秦</span>';
  } else {
    result.innerHTML = '<span style="color:#c8a040">这些线索的关联尚不明确，试试其他组合。</span>';
  }
}

// 打开面板
function openPanel(type) {
  var existing = document.querySelector('.panel');
  if (existing) existing.remove();

  var panel = document.createElement('div');
  panel.className = 'panel';
  var content = '';

  if (type === 'inv') {
    content = '<h2>🎒 道具栏</h2><div class="inv-grid">';
    var tools = [
      {id: '火折子', icon: '🔥', desc: '照明与验氧'}, {id: '蜡封', icon: '🕯', desc: '封堵孔洞'},
      {id: '洛阳铲', icon: '🪏', desc: '探测空腔'}, {id: '墨线', icon: '📏', desc: '标记位移'},
      {id: '绳钩', icon: '🪝', desc: '远程触发'}, {id: '拓包', icon: '🧽', desc: '复制铭文'},
      {id: '铜镜', icon: '🪞', desc: '反光与暗纹'}, {id: '朱砂', icon: '🟥', desc: '标记与补全'}
    ];
    var keyItems = [
      {id: '黑水玉玦', desc: '水德机关秘宝'}, {id: '黑玉残玦', desc: '主角命运凭证'},
      {id: '断木神斧', desc: '第一章秘宝'}, {id: '青铜虎符', desc: '控制兵俑'},
      {id: '黑水渠令', desc: '水系机关秘宝'}, {id: '朱丝', desc: '火属前置道具'},
      {id: '十二金人残片', desc: '隐藏条件收集物'}
    ];
    content += '<h3>盗墓工具</h3>';
    tools.forEach(function(t) {
      var owned = G.inventory[t.id];
      content += '<div class="inv-item" style="opacity:' + (owned ? 1 : 0.3) + '">';
      content += '<div class="icon">' + t.icon + '</div>';
      content += '<div class="name">' + t.id + '</div><div class="desc">' + t.desc + '</div></div>';
    });
    content += '</div><h3>关键秘宝</h3><div class="inv-grid">';
    keyItems.forEach(function(k) {
      var owned = G.inventory[k.id];
      content += '<div class="inv-item' + (owned && owned.key ? ' key-item' : '') + '" style="opacity:' + (owned ? 1 : 0.3) + '">';
      content += '<div class="icon">💎</div><div class="name">' + k.id + '</div>';
      content += '<div class="desc">' + (owned ? owned.desc : k.desc) + '</div></div>';
    });
    content += '</div>';
  } else if (type === 'notes') {
    content = '<h2>📖 帛书笔记</h2>';
    if (G.notes.length === 0) {
      content += '<p style="color:#6a5a3a;text-align:center;padding:20px">暂无笔记记录</p>';
    } else {
      G.notes.forEach(function(n) {
        content += '<div class="note-item"><div class="nt">◆ ' + n.title + '</div>';
        content += '<div class="nc">' + n.text + '</div></div>';
      });
    }
  } else if (type === 'reason') {
    content = '<h2>🧩 推理板</h2><p style="font-size:12px;color:#6a5a3a;margin-bottom:10px">将相关线索点击选中，组合推理出答案</p>';
    content += '<div class="reason-board" id="reasonBoard"></div>';
    content += '<div class="reason-result" id="reasonResult"></div>';
    content += '<div class="btn-row"><button class="ui-btn" onclick="checkReasoning()">组合推理</button><button class="ui-btn" onclick="clearReasoning()">清空</button></div>';
  }

  panel.innerHTML = content + '<span class="close" onclick="this.parentElement.remove()">✕</span>';
  $('game').appendChild(panel);

function setBg(img) {
  if (img) sceneBg.style.backgroundImage = 'url("' + img + '")';

function addInteractive(x, y, w, h, label, onClick, opts) {
  opts = opts || {};
  var el = document.createElement('div');
  el.className = 'interactive';
  el.style.left = x + 'px';
  el.style.top = y + 'px';
  el.style.width = w + 'px';
  el.style.height = h + 'px';
  if (opts.icon) {
    el.innerHTML = '<div style="text-align:center;font-size:' + (opts.iconSize || 28) + 'px;line-height:' + h + 'px">' + opts.icon + '</div>';
  }
  if (opts.label) {
    el.innerHTML += '<div style="position:absolute;bottom:-18px;left:50%;transform:translateX(-50%);font-size:11px;color:#8a6a4a;white-space:nowrap">' + opts.label + '</div>';
  }
  if (opts.skill) el.dataset.skill = opts.skill;
  el.onclick = function() {
    if (G.activeSkill && opts.skill && opts.skill.split(',').indexOf(G.activeSkill) >= 0) {
      if (opts.onSkill) {
        opts.onSkill(G.activeSkill);
      } else if (onClick) {
        onClick();
      }
      G.activeSkill = null;
      var allInt = document.querySelectorAll('.interactive');
      for (var i = 0; i < allInt.length; i++) allInt[i].classList.remove('highlight');
    } else if (onClick) {
      onClick();
    }
  };
  sceneArea.appendChild(el);
  return el;
}

// 帛书复原拼图
function startSilkPuzzle() {
  var panel = document.createElement('div');
  panel.className = 'panel';
  panel.style.display = 'block';
  panel.id = 'silkPuzzlePanel';

  var pieces = [
    {id: 'A', text: '黑水', correct: 0},
    {id: 'B', text: '入陵', correct: 1},
    {id: 'C', text: '玄药', correct: 2},
    {id: 'D', text: '不死', correct: 3},
    {id: 'E', text: '路线残纹', correct: 4}
  ];
  var slots = [null, null, null, null, null];
  var availablePieces = pieces.slice();

  function renderPuzzle() {
    var h = '<h2>🧩 帛书复原</h2>';
    h += '<p style="text-align:center;color:#6a5a3a;margin-bottom:10px">将残片拖放到正确位置，复原"黑水入陵，玄药不死"</p>';
    h += '<div class="puzzle-grid" style="grid-template-columns:repeat(5,1fr);max-width:600px">';
    for (var i = 0; i < 5; i++) {
      h += '<div class="puzzle-slot' + (slots[i] ? ' filled' : '') + '" onclick="window._placeSilkPiece(' + i + ')" id="slot' + i + '">';
      h += (slots[i] ? slots[i].text : '空位') + '</div>';
    }
    h += '</div>';
    h += '<div class="btn-row" style="margin-top:12px">';
    availablePieces.forEach(function(p) {
      h += '<div class="puzzle-piece" onclick="window._selectSilkPiece(\'' + p.id + '\')" id="piece' + p.id + '">' + p.text + '</div>';
    });
    h += '</div>';
    h += '<span class="close" onclick="window._closeSilkPuzzle()">✕</span>';
    panel.innerHTML = h;
  }

  window._placeSilkPiece = function(idx) {
    if (!G.selectedPiece) return;
    var piece = pieces.find(function(p) { return p.id === G.selectedPiece; });
    if (!piece) return;
    if (slots[idx]) {
      availablePieces.push(slots[idx]);
      slots[idx] = null;
    }
    slots[idx] = piece;
    availablePieces = availablePieces.filter(function(p) { return p.id !== piece.id; });
    G.selectedPiece = null;
    var allPieces = document.querySelectorAll('.puzzle-piece');
    for (var i = 0; i < allPieces.length; i++) allPieces[i].classList.remove('selected');
    renderPuzzle();

    // 检查完成
    var correct = true;
    for (var i = 0; i < 5; i++) {
      if (!slots[i] || slots[i].correct !== i) { correct = false; break; }
    }
    if (correct) {
      setTimeout(function() {
        completePuzzle('silk_puzzle');
        showDialogue('沈砚', '复原了："黑水入陵，玄药不死。"残图显示一条从旧祠通往地下的路径……尽头缺了半枚玉玦形状。', function() {
          addNote('黑水残简', '帛书复原后显示"黑水入陵，玄药不死"。残图指示旧祠位置。');
          window._closeSilkPuzzle();
          showDialogue('沈砚', '这个玉玦缺口……和我的黑玉残玦形状吻合。也许需要用水激活它。');
        });
      }, 500);
    }
  };

  window._selectSilkPiece = function(id) {
    G.selectedPiece = G.selectedPiece === id ? null : id;
    var allPieces = document.querySelectorAll('.puzzle-piece');
    for (var i = 0; i < allPieces.length; i++) {
      allPieces[i].classList.toggle('selected', allPieces[i].id === 'piece' + G.selectedPiece);
    }
  };

  window._closeSilkPuzzle = function() {
    panel.remove();
    if (!G.completedPuzzles['silk_puzzle']) {
      availablePieces = pieces.slice();
      slots = [null, null, null, null, null];
    }
  };

  renderPuzzle();
  $('game').appendChild(panel);
}

function startMuralPuzzle() {
  var panel = document.createElement('div');
  panel.className = 'panel';
  panel.style.display = 'block';
  panel.id = 'muralPanel';

  var correct = ['A','B','C','D','E','F'];
  var current = ['C','A','F','B','E','D'];
  var murals = {
    A: '南山大梓，树冠遮天', B: '秦人持青铜斧伐树',
    C: '风雨骤起，斧痕闭合', D: '病者夜闻鬼语',
    E: '朱丝绕树，披发再伐', F: '树断，青牛出走丰水'
  };
  var selectedMural = -1;

  function render() {
    var h = '<h2>🖼 风雨自合壁画排序</h2>';
    h += '<p style="text-align:center;color:#6a5a3a;margin-bottom:10px">按正确顺序排列壁画(点击交换)</p>';
    h += '<div style="display:flex;gap:6px;justify-content:center;flex-wrap:wrap">';
    current.forEach(function(id, i) {
      h += '<div class="puzzle-piece" onclick="window._swapMural(' + i + ')" style="min-width:80px">';
      h += '<div style="font-weight:bold">' + String.fromCharCode(65+i) + '</div>';
      h += '<div style="font-size:11px">' + murals[id] + '</div></div>';
    });
    h += '</div>';
    h += '<div class="btn-row"><button class="ui-btn" onclick="window._checkMural()">确认顺序</button></div>';
    h += '<span class="close" onclick="window._closeMural()">✕</span>';
    panel.innerHTML = h;
  }

  window._swapMural = function(idx) {
    if (selectedMural === -1) { selectedMural = idx; render(); }
    else {
      var tmp = current[selectedMural];
      current[selectedMural] = current[idx];
      current[idx] = tmp;
      selectedMural = -1;
      render();
    }
  };

  window._checkMural = function() {
    if (current.join(',') === correct.join(',')) {
      completePuzzle('mural_order');
      showDialogue('沈砚', '壁画顺序正确！单用斧头无法断木，需要先用朱丝困住树神。', function() {
        addNote('神木自合', '壁画显示秦人初次伐树时，风雨骤起，树身伤口会重新合拢。');
        addNote('朱丝破法', '病者夜闻鬼语，得知披发并以朱丝绕树，可使树神受困。');
        addReasonClue('树创复合', '树身伤口会自合');
        addReasonClue('朱丝缚木', '朱丝可困树神');
        addReasonClue('南方属火', '朱色属火，南方属火');
        window._closeMural();
        ch1SouthWall();
      });
    } else {
      showDialogue('沈砚', '顺序不对……想想伐树的前后逻辑。树被砍→伤口复合→鬼语提示→朱丝破法→重新伐树→青牛出水。');
    }
  };

  window._closeMural = function() { panel.remove(); };
  render();
  $('game').appendChild(panel);
}

function ch3Writing() {
  G.scene = 1;

  clearScene();
  setBg(LV(3, '主背景4.png'));

  var selectedChars = [];
  var correct = ['六','合','同','风','玄','水','归','一'];
  var options = ['六','合','同','风','玄','水','归','一','火','山','木','金'];

  function renderWriting() {
    var oldBtns = document.querySelectorAll('.write-btn');
    for (var i = 0; i < oldBtns.length; i++) oldBtns[i].remove();

    var positions = [
      {x:100,y:200},{x:200,y:200},{x:300,y:200},{x:400,y:200},
      {x:500,y:200},{x:600,y:200},{x:700,y:200},{x:800,y:200}
    ];

    positions.forEach(function(p, i) {
      var btn = document.createElement('div');
      btn.className = 'interactive write-btn';
      btn.style.left = p.x + 'px';
      btn.style.top = p.y + 'px';
      btn.style.width = '60px';
      btn.style.height = '60px';
      btn.style.border = '2px solid #5a4020';
      btn.style.borderRadius = '4px';
      btn.style.display = 'flex';
      btn.style.alignItems = 'center';
      btn.style.justifyContent = 'center';
      btn.style.fontSize = '22px';
      btn.style.color = '#c8a040';
      btn.style.background = 'rgba(20,10,5,0.8)';
      btn.style.cursor = 'pointer';
      btn.textContent = selectedChars[i] || '?';

      (function(idx) {
        btn.onclick = function() {
          var optsPanel = document.createElement('div');
          optsPanel.className = 'panel';
          optsPanel.style.display = 'block';
          var h = '<h3>选择秦小篆字</h3><div class="btn-row">';
          options.forEach(function(c) {
            h += '<button class="ui-btn" onclick="this.parentElement.parentElement.remove();selectedChars[' + idx + ']=\'' + c + '\';renderWriting();checkWriting()">' + c + '</button>';
          });
          h += '</div><span class="close" onclick="this.parentElement.remove()">✕</span>';
          optsPanel.innerHTML = h;
          $('game').appendChild(optsPanel);
        };
      })(i);

      sceneArea.appendChild(btn);
    });

    if (!document.querySelector('.write-hint')) {
      var hint = document.createElement('div');
      hint.className = 'write-hint';
      hint.style.cssText = 'position:absolute;bottom:100px;left:50%;transform:translateX(-50%);color:#6a5a3a;font-size:13px';
      hint.textContent = '目标句子：六合同风，玄水归一';
      sceneArea.appendChild(hint);
    }
  }

  window.checkWriting = function() {
    if (selectedChars.length === 8 && selectedChars.join(',') === correct.join(',')) {
      completePuzzle('writing');
      showDialogue('沈砚', '"六合同风，玄水归一"——六条浅槽灰尘震落，第一段黑水线恢复！', function() {
        addNote('六合同风', '书同文完成。六国文字统一为秦小篆，黑水线恢复。');
        transitionScene(function() { ch3Measure(); });
      });
    }
  };

  window.renderWriting = renderWriting;
  renderWriting();
}

    btn.style.width = '140px';
    btn.style.height = '80px';
    btn.style.border = '2px dashed #5a4020';
    btn.style.display = 'flex';
    btn.style.alignItems = 'center';
    btn.style.justifyContent = 'center';
    btn.style.color = '#8a6a4a';
    btn.style.fontSize = '13px';
    btn.style.cursor = 'pointer';
    btn.textContent = '轨段' + (i + 1) + '(调整)';

    (function(b, idx) {
      b.onclick = function() {
        b.style.borderColor = '#60c060';
        b.style.borderStyle = 'solid';
        b.textContent = '轨段' + (idx + 1) + ' ✓';
        tracksDone++;
        b.onclick = function() {};
        if (tracksDone >= 3) {
          completePuzzle('track');
          showDialogue('沈砚', '三段车轨已统一为秦制标准。机关车轮顺利滚到尽头，闸门开启！第三段黑水线恢复。', function() {
            addNote('车同轨', '三段车轨统一为秦制。黑水线三段全通！');
            transitionScene(function() { ch3TigerTally(); });
          });
        }
      };
    })(btn, i);

    sceneArea.appendChild(btn);
  }

  addInteractive(400, 380, 150, 60, '', function() {
    if (tracksDone < 3) showDialogue('沈砚', '秦轨模板背面刻有"同轨"。需要用这个来对齐轨距。');
  }, {icon: '📋', label: '秦轨模板'});
}

function ch3TigerTally() {
  G.scene = 4;
  chapterLabel.textContent = '第三章：中央虎符台';
  clearScene();
  setBg(LV(3, '主背景4.png'));

  addInteractive(400, 250, 200, 150, '', function() {
    if (!G.inventory['断木神斧']) {
      showDialogue('沈砚', '虎符台缺失半枚虎符，外锁需要金属机关钥打开。');
      return;
    }

    showDialogue('沈砚', '用断木神斧打开虎符龛外锁，取得半枚青铜虎符！', function() {
      gainItem('青铜虎符', '青铜虎符', '控制兵俑阵列方向', true);

      var order = ['韩','赵','魏','楚','燕','齐'];
      var step = 0;

      var triggerBtn = document.createElement('div');
      triggerBtn.className = 'interactive';
      triggerBtn.style.left = '350px';
      triggerBtn.style.top = '420px';
      triggerBtn.style.width = '300px';
      triggerBtn.style.height = '60px';
      triggerBtn.style.border = '2px solid #b8960c';
      triggerBtn.style.display = 'flex';
      triggerBtn.style.alignItems = 'center';
      triggerBtn.style.justifyContent = 'center';
      triggerBtn.style.color = '#b8960c';
      triggerBtn.style.fontSize = '16px';
      triggerBtn.style.cursor = 'pointer';
      triggerBtn.style.background = 'rgba(20,10,5,0.9)';
      triggerBtn.textContent = '按顺序触发六国门铭：韩→赵→魏→楚→燕→齐';

      triggerBtn.onclick = function() {
        if (step < 6) {
          showDialogue('系统', order[step] + '国兵俑转向中央黑水旗！(' + (step+1) + '/6)');
          step++;
          if (step >= 6) {
            completePuzzle('tiger');
            gainItem('十二金人残片', '十二金人残片', '终局隐藏条件收集物', true);
            showDialogue('系统', '六国兵俑全部转向黑水旗，齐声跪拜！十二金人残片龛打开。', function() {
              showDialogue('沈砚', '六国文字、车轨、尺度各不相同。可在这里，它们都被迫归于同一条黑水线。', function() {
                addNote('六合同风', '六国兵俑归一。"六合同风，玄水归一"——水银地宫入口开启。');
                G.chapterUnlocked[4] = true;
                showDialogue('系统', '🎉 第三章完成！第四章已解锁。', function() {
                  showDialogue('沈砚', '这座陵墓记住的不是战争，而是统一之后的秩序。');
                });
              });
            });
          }
        }
      };
      sceneArea.appendChild(triggerBtn);
    });
  }, {icon: '🐯', label: '虎符台'});
}

// ==================== 第四章：水银江河 ====================
function ch4Start() {
  G.chapter = 4; G.scene = 0;
  chapterLabel.textContent = '第四章：水银江河 · 地宫前庭';
  clearScene();
  setBg(LV(4, '主背景5.png'));
  unlockSkill('封气', '临时封堵水银蒸汽孔和毒气孔');
  renderSkills();

  addInteractive(200, 300, 100, 80, '', function() {
    showDialogue('沈砚', '墙碑："银为江，黑为归，气不可久闻"。银雾有毒！', function() {
      addNote('银雾风险', '水银蒸汽有毒，需要使用封气技能堵住喷气孔。');
    });
  }, {icon: '🪦', label: '墙碑'});

  addInteractive(550, 200, 80, 60, '', function() {
    showDialogue('沈砚', '右侧喷气孔正在喷出银白雾气，使用封气堵住它。', function() {
      showDialogue('封气', '喷气孔已被蜡封堵住，银雾逐渐变淡。前方闸门可以操作了。', function() {
        completePuzzle('seal');
        transitionScene(function() { ch4Astronomy(); });
      });
    });
  }, {icon: '💨', label: '喷气孔', skill: '封气'});
}

function ch4Astronomy() {
  G.scene = 1;
  chapterLabel.textContent = '第四章：北斗倒影';
  clearScene();
  setBg(LV(4, '主背景5.png'));

  var starsLit = 0;

  for (var i = 0; i < 7; i++) {
    var x = 300 + (i % 4) * 80;
    var y = 180 + Math.floor(i / 4) * 100 + (i === 4 ? 50 : 0) + (i === 5 ? 30 : 0) + (i === 6 ? 60 : 0);
    var star = document.createElement('div');
    star.className = 'interactive';
    star.style.left = x + 'px';
    star.style.top = y + 'px';
    star.style.width = '40px';
    star.style.height = '40px';
    star.style.borderRadius = '50%';
    star.style.border = '2px solid #4a3820';
    star.style.background = 'rgba(20,10,5,0.6)';
    star.style.cursor = 'pointer';

    star.onclick = function() {
      starsLit++;
      this.style.background = 'rgba(200,200,250,0.9)';
      this.style.boxShadow = '0 0 15px rgba(200,200,250,0.8)';
      this.style.borderColor = 'rgba(200,200,250,0.8)';
      this.onclick = function() {};
      if (starsLit >= 7) {
        completePuzzle('dipper');
        showDialogue('沈砚', '北斗七星全部点亮！星图已记录到笔记。石柱刻有"斗柄指北，玄水乃归"。', function() {
          addNote('北斗星图', '北斗七星的位置已记录。斗柄指北，需将此映射到地面水渠。');
          transitionScene(function() { ch4Rivers(); });
        });
      }
    };
    sceneArea.appendChild(star);
  }

  addInteractive(450, 350, 150, 40, '', function() {
    showDialogue('沈砚', '"斗柄指北，玄水乃归"——北方是水银的终点。');
  }, {icon: '📜', label: '石柱铭文'});
}

function ch4Rivers() {
  G.scene = 2;
  chapterLabel.textContent = '第四章：江河归流';
  clearScene();
  setBg(LV(4, '主背景5.png'));

  var gates = {south: true, west: true, east: true, north: false};

  ['南','西','东','北'].forEach(function(dir, i) {
    var gate = document.createElement('div');
    gate.className = 'interactive';
    gate.style.left = (250 + i * 150) + 'px';
    gate.style.top = '300px';
    gate.style.width = '80px';
    gate.style.height = '80px';
    gate.style.border = '2px solid #5a4020';
    gate.style.display = 'flex';
    gate.style.alignItems = 'center';
    gate.style.justifyContent = 'center';
    gate.style.color = '#b8960c';
    gate.style.fontSize = '13px';
    gate.style.background = 'rgba(20,10,5,0.8)';
    gate.style.cursor = 'pointer';
    gate.style.borderRadius = '4px';
    gate.textContent = dir + '闸门';

    gate.onclick = function() {
      if (dir === '南') {
        gates.south = false;
        gate.style.borderColor = '#c04030';
        updateRisk(1);
        showDialogue('沈砚', '南侧是火坑！必须关闭，否则水银会被蒸发。', function() {});
      } else if (dir === '西') {
        gates.west = !gates.west;
        gate.style.borderColor = gates.west ? '#5a4020' : '#60c060';
        showDialogue('系统', '西侧金门已调整。');
      } else if (dir === '东') {
        gates.east = !gates.east;
        gate.style.borderColor = gates.east ? '#5a4020' : '#60c060';
        showDialogue('系统', '东侧木渠已调整。');
      } else if (dir === '北') {
        if (!gates.south && !gates.west && !gates.east) {
          gates.north = true;
          gate.style.borderColor = '#60c060';
          showDialogue('系统', '北方黑水主渠开启！三路水银汇入北渠，第一段北斗水线出现。', function() {
            completePuzzle('rivers');
            addNote('江河归流', '水银从三路汇入北方黑水主渠，形成北斗水线雏形。');
            transitionScene(function() { ch4Buoy(); });
          });
        } else {
          showDialogue('沈砚', '还需要先调整其他闸门，确保水银能正确汇入北渠。');
        }
      }
    };
    sceneArea.appendChild(gate);
  });

  addInteractive(420, 200, 200, 30, '', function() {
    showDialogue('沈砚', '"百川不同源，归秦则一流"——将所有水银都导向北方。');
  }, {icon: '📜', label: '地图铭文'});
}

function ch4Buoy() {
  G.scene = 3;
  chapterLabel.textContent = '第四章：水位校准';
  clearScene();
  setBg(LV(4, '主背景5.png'));

  var targets = {'斗口': '中', '斗身': '高', '斗柄': '低'};
  var current = {'斗口': '低', '斗身': '低', '斗柄': '低'};
  var levels = ['低','中','高'];

  ['斗口','斗身','斗柄'].forEach(function(part, idx) {
    var buoy = document.createElement('div');
    buoy.className = 'interactive';
    buoy.style.left = (200 + idx * 220) + 'px';
    buoy.style.top = '250px';
    buoy.style.width = '100px';
    buoy.style.height = '120px';
    buoy.style.border = '2px solid #5a4020';
    buoy.style.display = 'flex';
    buoy.style.flexDirection = 'column';
    buoy.style.alignItems = 'center';
    buoy.style.justifyContent = 'center';
    buoy.style.color = '#b8960c';
    buoy.style.fontSize = '13px';
    buoy.style.background = 'rgba(20,10,5,0.8)';
    buoy.style.cursor = 'pointer';
    buoy.style.borderRadius = '4px';
    buoy.innerHTML = '<div>' + part + '</div><div style="font-size:20px" id="buoy' + idx + '">低</div>';

    buoy.onclick = function() {
      var ci = levels.indexOf(current[part]);
      current[part] = levels[(ci + 1) % 3];
      document.getElementById('buoy' + idx).textContent = current[part];

      if (current['斗口'] === targets['斗口'] && current['斗身'] === targets['斗身'] && current['斗柄'] === targets['斗柄']) {
        completePuzzle('buoy');
        showDialogue('沈砚', '水位校准完成！北斗图案完整成形——斗口稳、斗身满、斗柄细。', function() {
          addNote('水位校准', '三枚浮标调整正确。斗口中位、斗身高位、斗柄低位。');
          transitionScene(function() { ch4BlackPool(); });
        });
      }
    };
    sceneArea.appendChild(buoy);
  });

  addInteractive(420, 400, 250, 30, '', function() {
    showDialogue('沈砚', '"水不及，则星不明；水太过，则斗不成"——需要根据渠宽调整水位。');
  }, {icon: '📜', label: '墙面提示'});
}

function ch4BlackPool() {
  G.scene = 4;
  chapterLabel.textContent = '第四章：北方黑池 · 水银星图';
  clearScene();
  setBg(LV(4, '主背景5.png'));

  addInteractive(400, 180, 200, 150, '', function() {
    if (G.inventory['黑水玉玦']) {
      showDialogue('沈砚', '打开中央总闸！水银沿地面沟渠形成完整北斗。使用黑水玉玦激活黑池。', function() {
        showDialogue('系统', '斗柄指向北方黑池，水银在池中化为玄黑色。黑水渠令升起！', function() {
          completePuzzle('star_map');
          gainItem('黑水渠令', '黑水渠令', '水系机关秘宝', true);
          addNote('水银星图', '北斗星渠全部点亮，水银流入北方黑池化为玄黑。获得黑水渠令。');
          showDialogue('沈砚', '水银不是为了防盗才流在这里。它在替这座陵墓记住天下的形状。', function() {
            showDialogue('沈砚', '百川江河，最终都被引向同一个黑色的北方。', function() {
              showDialogue('沈砚', '如果水银是秦陵的江河，那么不死药也许不是药。它更像是这套机关的心脏。', function() {
                showDialogue('系统', '🎉 第四章完成！前四章全破！', function() {
                  showEnding();
                });
              });
            });
          });
        });
      });
    } else {
      showDialogue('沈砚', '黑池需要黑水玉玦来激活。');
    }
  }, {icon: '🌑', label: '北方黑池'});
}

// ==================== 结局 ====================
function showEnding() {
  clearScene();
  setBg('');
  chapterLabel.textContent = '结局';

  var endingType;
  if (G.risk <= 3) endingType = 'hidden';
  else if (G.risk <= 6) endingType = 'seal';
  else endingType = 'take';

  var endings = {
    seal: {
      title: '结局：封药',
      text: '你重新封印了不死药。秦陵重新沉入地下，你带走了拓片与真相。\n\n真正的不朽，是文明记忆。',
      extra: '黑水声在身后逐渐远去。那些刻在石壁上的文字，比任何不死药都更长久。'
    },
    take: {
      title: '结局：取药',
      text: '你取走了不死药，逃出秦陵。\n\n但袖口渗出了黑色的水痕……对永生的贪欲，延续了秦皇的执念。',
      extra: '那滴水痕再也没有干过。'
    },
    hidden: {
      title: '隐藏结局：黑水不息',
      text: '你没有取药，也没有毁药。\n\n你把黑玉残玦留在了秦王墓室，秦陵不再召唤后人。\n\n黑水声逐渐远去……你终于读懂了这座陵墓。',
      extra: '历史不是死亡，而是循环。\n\n你走出了秦陵，但黑玉残玦留在了那里——等待下一个读懂水德的人。'
    }
  };

  var e = endings[endingType];

  var panel = document.createElement('div');
  panel.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;z-index:300;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(5,3,0,0.95)';
  var stars = '';
  for (var i = 0; i < 5; i++) stars += i < Math.min(G.risk, 5) ? '★' : '☆';
  panel.innerHTML = '' +
    '<div style="font-size:36px;color:#b8960c;margin-bottom:20px;letter-spacing:8px">' + e.title + '</div>' +
    '<div style="max-width:500px;text-align:center;color:#d4c098;font-size:16px;line-height:2;white-space:pre-line">' + e.text + '</div>' +
    '<div style="color:#8a6a4a;margin-top:20px;font-size:13px;white-space:pre-line;text-align:center">' + e.extra + '</div>' +
    '<div style="margin-top:40px;color:#b8960c;font-size:14px">最终风险值：' + stars + '</div>' +
    '<button class="title-btn" style="margin-top:30px;font-size:14px" onclick="location.reload()">重返标题</button>';
  $('game').appendChild(panel);
}

// ==================== 启动 ====================
function init() {
  try {
    renderRisk();
    showTitle();
    console.log('【水德秦陵】游戏初始化完成');
  } catch (e) {
    alert('游戏加载失败: ' + e.message);
    console.error(e);
  }
}

init();
</script>
